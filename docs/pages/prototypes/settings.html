<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>阿米加 - 设置</title>
<style>
:root{--green:#58cc02;--green-hover:#46a302;--green-bg:#eaffd6;--blue:#1cb0f6;--blue-bg:#ddf4ff;--orange:#ff9600;--orange-hover:#e08500;--orange-bg:#fff0d6;--red:#ff4b4b;--red-bg:#ffe0e0;--purple:#7c3aed;--purple-bg:#ede9fe;--text:#3a3a3a;--text-light:#777;--text-lighter:#aaa;--bg:#f5f5f5;--white:#fff;--border:#e5e5e5;--radius:12px;--radius-sm:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;font-size:15px;color:var(--text);background:#f5f5f5}
.phone{width:320px;height:768px;background:var(--white);border-radius:44px;box-shadow:0 12px 48px rgba(0,0,0,.22),inset 0 0 0 1px rgba(255,255,255,.1);border:3px solid #1a1a1a;position:relative;box-sizing:content-box;overflow:hidden;flex-shrink:0}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:30px;background:#1a1a1a;border-radius:0 0 20px 20px;z-index:20}
.phone-notch::after{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;border:2px solid #333;background:transparent}
.phone-screen{width:100%;height:100%;display:flex;flex-direction:column;background:var(--bg)}
.phone-content{padding:38px 0 0;flex:1;overflow-y:auto;min-height:0}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 24px 4px;font-size:12px;font-weight:700;background:var(--white);position:absolute;top:0;left:0;right:0;z-index:15;color:#1a1a1a;height:36px}
.status-bar .time{font-weight:800;font-size:13px}
.status-icons{display:flex;align-items:center;gap:4px;font-size:11px}
.tab-bar{display:flex;background:var(--white);border-top:1px solid var(--border);flex-shrink:0;padding:4px 0;justify-content:space-around}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 8px;cursor:pointer;border:none;background:none;font-size:10px;color:var(--text-lighter);transition:all .2s;font-family:inherit}
.tab-item .tab-icon{font-size:20px;line-height:1}
.tab-item .tab-label{font-size:10px;font-weight:500}
.tab-item.active{color:var(--green);position:relative}
.tab-item.active::after{content:'';position:absolute;top:-1px;width:20px;height:3px;background:var(--green);border-radius:0 0 3px 3px}
/* Settings header */
.settings-header{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--white);border-bottom:1px solid var(--border)}
.settings-header .sh-icon{font-size:24px}
.settings-header .sh-title{font-size:18px;font-weight:700}
/* Settings groups */
.settings-group{margin:12px 16px}
.settings-group .sg-label{font-size:11px;font-weight:600;color:var(--text-lighter);padding:0 4px 6px;text-transform:uppercase;letter-spacing:.5px}
.settings-card{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.setting-item{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background .12s;min-height:48px}
.setting-item:active{background:var(--green-bg)}
.setting-item .si-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.setting-item .si-body{flex:1;min-width:0}
.setting-item .si-title{font-size:14px;font-weight:500}
.setting-item .si-desc{font-size:11px;color:var(--text-light);margin-top:1px}
.setting-item .si-value{font-size:13px;color:var(--text-light);flex-shrink:0;display:flex;align-items:center;gap:4px}
.setting-item .si-arrow{color:var(--text-lighter);font-size:16px;flex-shrink:0}
.setting-item .toggle{width:42px;height:24px;border-radius:12px;background:var(--border);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.setting-item .toggle.on{background:var(--green)}
.setting-item .toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15);transition:transform .2s}
.setting-item .toggle.on::after{transform:translateX(18px)}
/* API config */
.api-card{background:var(--white);border-radius:var(--radius);margin:0 16px 10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.api-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.api-card-header .api-label{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.api-card-header .api-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.api-badge.primary{background:var(--green-bg);color:var(--green)}
.api-badge.backup{background:var(--orange-bg);color:var(--orange)}
.api-field{margin-bottom:8px}
.api-field-label{font-size:11px;font-weight:600;color:var(--text-light);margin-bottom:3px;display:flex;align-items:center;gap:4px}
.api-field-input{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);font-size:12px;font-family:inherit;outline:none;background:var(--bg);color:var(--text)}
.api-field-input:focus{border-color:var(--green)}
.api-test-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:6px;border:1px solid var(--green);background:var(--green-bg);color:var(--green);font-size:11px;font-weight:600;cursor:pointer;margin-top:6px;font-family:inherit}
.api-test-btn:hover{background:var(--green);color:#fff}
.api-test-btn:active{transform:scale(.97)}
.api-divider{height:1px;background:var(--border);margin:8px 16px}
body.embed{background:#e8e8e8;display:flex;align-items:center;justify-content:center;min-height:100vh}
body.embed .phone{margin:10px auto}
</style>
</head>
<body>
<script>(function(){if(location.search.indexOf('embed=1')>=0)document.body.className='embed';})();</script>
<div class="phone">
<div class="phone-notch"></div>
<div class="phone-screen">
<div class="status-bar"><span class="time">9:41</span><span class="status-icons">📶 5G 🔋 100%</span></div>
<div class="phone-content">
<div class="settings-header">
  <span class="sh-icon">⚙️</span>
  <span class="sh-title">设置</span>
</div>

<div class="settings-group">
  <div class="sg-label">语言</div>
  <div class="settings-card">
    <div class="setting-item"><span class="si-icon">🌍</span><div class="si-body"><div class="si-title">界面语言</div><div class="si-desc">当前语言</div></div><span class="si-value">中文</span><span class="si-arrow">›</span></div>
  </div>
</div>

<div class="settings-group">
  <div class="sg-label">🤖 大模型 API</div>
  <!-- Primary Model -->
  <div class="api-card">
    <div class="api-card-header">
      <span class="api-label">主模型 <span class="api-badge primary">优先使用</span></span>
    </div>
    <div class="api-field">
      <div class="api-field-label">API Base URL</div>
      <input class="api-field-input" type="text" value="https://api.deepseek.com/v1" placeholder="https://api.openai.com/v1">
    </div>
    <div class="api-field">
      <div class="api-field-label">API Key 🔒</div>
      <input class="api-field-input" type="password" value="sk-abcdef123456" placeholder="sk-xxxxx">
    </div>
    <div class="api-field">
      <div class="api-field-label">模型名称</div>
      <input class="api-field-input" type="text" value="deepseek-chat" placeholder="gpt-4o-mini">
    </div>
    <button class="api-test-btn">🔌 测试连接</button>
  </div>
  <!-- Backup Model -->
  <div class="api-card">
    <div class="api-card-header">
      <span class="api-label">备用模型 <span class="api-badge backup">自动降级</span></span>
    </div>
    <div class="api-field">
      <div class="api-field-label">API Base URL</div>
      <input class="api-field-input" type="text" value="" placeholder="https://api.siliconflow.cn/v1">
    </div>
    <div class="api-field">
      <div class="api-field-label">API Key 🔒</div>
      <input class="api-field-input" type="password" value="" placeholder="sk-xxxxx">
    </div>
    <div class="api-field">
      <div class="api-field-label">模型名称</div>
      <input class="api-field-input" type="text" value="" placeholder="Qwen/Qwen2.5-72B">
    </div>
    <button class="api-test-btn">🔌 测试连接</button>
  </div>
</div>

<div style="height:12px"></div>
</div><!-- /phone-content -->
<div class="tab-bar">
  <button class="tab-item"><span class="tab-icon">🏠</span><span class="tab-label">学习</span></button>
  <button class="tab-item"><span class="tab-icon">🏆</span><span class="tab-label">排行</span></button>
  <button class="tab-item"><span class="tab-icon">👥</span><span class="tab-label">互动</span></button>
  <button class="tab-item active"><span class="tab-icon">👤</span><span class="tab-label">个人</span></button>
</div>
</div><!-- /phone-screen -->
</div><!-- /phone -->
</body>
</html>
