<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amiga - 外语学习应用</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f13;
      color: #e8e8ed;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      line-height: 1.5;
    }
    .container {
      max-width: 420px;
      width: 90%;
      text-align: center;
      padding: 2rem 1.5rem;
    }
    .icon {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin-bottom: 1rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: .25rem; }
    .subtitle { color: #9898a0; font-size: .9rem; margin-bottom: .5rem; }
    .version { display: inline-block; background: #1c1c24; padding: .2rem .8rem; border-radius: 12px; font-size: .8rem; color: #7c7c84; margin-bottom: 1.5rem; }
    .desc { color: #b0b0b8; font-size: .92rem; margin-bottom: 2rem; line-height: 1.6; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      padding: .85rem 2rem;
      font-size: 1.05rem;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s, transform .15s;
      margin-bottom: 1.5rem;
    }
    .btn:hover { background: #2563eb; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn svg { width: 20px; height: 20px; fill: currentColor; }
    .links { font-size: .85rem; }
    .links a { color: #6b8cff; text-decoration: none; margin: 0 .6rem; }
    .links a:hover { text-decoration: underline; }
    .footer { margin-top: 2.5rem; font-size: .75rem; color: #5c5c64; }
    .features { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: 2rem; }
    .feature { background: #1a1a22; border-radius: 12px; padding: .9rem .6rem; }
    .feature .emoji { font-size: 1.4rem; display: block; margin-bottom: .3rem; }
    .feature .label { font-size: .78rem; color: #9898a0; }
    @media (max-width: 360px) {
      .features { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/amiga-icon.png" alt="Amiga" class="icon">
    <h1>Amiga</h1>
    <p class="subtitle">你的 AI 外语学习伙伴</p>
    <span class="version" id="version">v0.3.8</span>
    <p class="desc">通过 AI 新闻阅读、智能聊天、词库管理，轻松掌握新语言。</p>

    <a class="btn" href="/Amiga.apk" download>
      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      下载 Android APK
    </a>

    <div class="features">
      <div class="feature"><span class="emoji">📰</span><span class="label">AI 新闻</span></div>
      <div class="feature"><span class="emoji">💬</span><span class="label">语言聊天</span></div>
      <div class="feature"><span class="emoji">📖</span><span class="label">词库管理</span></div>
      <div class="feature"><span class="emoji">🧠</span><span class="label">AI 问答</span></div>
    </div>

    <div class="links">
      <a href="https://github.com/wesele/Amiga/releases" target="_blank">更新日志</a>
      <a href="https://github.com/wesele/Amiga" target="_blank">GitHub</a>
    </div>

    <div class="footer">
      &copy; 2026 Amiga &mdash; 基于 Tauri + Vue 3
    </div>
  </div>

  <script>
    const ver = document.getElementById('version');
    const tag = document.cookie.match(/version=([^;]+)/);
    if (tag) ver.textContent = 'v' + tag[1];
  </script>
</body>
</html>
