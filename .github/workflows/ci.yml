name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  rust:
    name: Rust (cargo test + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Install Linux system deps (Tauri runtime)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev
      # tauri::generate_context!() (src/lib.rs) needs ../dist to exist at
      # compile time. Build the frontend in this job (parallel to the Vitest
      # job above) so cargo can resolve the macro.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      # content-studio/data/vocabulary.json is gitignored (server-persisted JSON
      # regenerated by Content Studio). The Rust lib `include_str!`s it at
      # compile time, so provide a placeholder when missing so CI can build.
      - name: Ensure vocabulary.json exists (CI placeholder)
        run: |
          mkdir -p content-studio/data
          if [ ! -f content-studio/data/vocabulary.json ]; then
            echo '{"data":{}}' > content-studio/data/vocabulary.json
            echo "Created placeholder vocabulary.json for CI"
          fi
      - name: cargo fmt (check)
        working-directory: src-tauri
        run: cargo fmt --all -- --check
      - name: cargo clippy (warnings visible, non-blocking)
        working-directory: src-tauri
        continue-on-error: true
        run: cargo clippy --all-targets --message-format=short 2>&1 | tee clippy.log
      - name: Upload clippy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-log
          path: src-tauri/clippy.log
          if-no-files-found: ignore
      - name: cargo test
        working-directory: src-tauri
        run: cargo test --locked
