<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Idioma - 社交</title>
<style>
:root{--green:#58cc02;--green-hover:#46a302;--green-bg:#eaffd6;--blue:#1cb0f6;--blue-hover:#1899d6;--blue-bg:#ddf4ff;--orange:#ff9600;--orange-hover:#e08500;--orange-bg:#fff0d6;--red:#ff4b4b;--red-bg:#ffe0e0;--purple:#7c3aed;--purple-bg:#ede9fe;--pink:#ec4899;--pink-bg:#fce7f3;--text:#3a3a3a;--text-light:#777;--text-lighter:#aaa;--bg:#f7f7f7;--white:#fff;--border:#e5e5e5;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 30px rgba(0,0,0,.12);--radius:12px;--radius-sm:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;font-size:15px;color:var(--text);background:#e8e8e8}
.phone-wrap{display:flex;justify-content:center;margin:30px 0}
.phone{width:320px;height:640px;background:var(--white);border-radius:40px;box-shadow:var(--shadow-lg);border:2px solid #ddd;position:relative;overflow:hidden;flex-shrink:0}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:24px;background:#222;border-radius:0 0 16px 16px;z-index:10}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg)}
.phone-screen::-webkit-scrollbar{width:0}
.phone-content{padding:8px 16px 60px}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 20px 6px;font-size:11px;font-weight:600;background:var(--white);position:sticky;top:0;z-index:5}
.status-bar .time{font-weight:700}
.tab-bar{display:flex;background:var(--white);border-top:1px solid var(--border);position:sticky;bottom:0;z-index:5;padding:4px 0;justify-content:space-around}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;cursor:pointer;border:none;background:none;font-size:10px;color:var(--text-lighter);transition:all .2s;font-family:inherit}
.tab-item .tab-icon{font-size:20px;line-height:1}
.tab-item.active{color:var(--green)}
.bilingual-card{background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:transform .15s}
.bilingual-card:hover{transform:scale(1.02)}
.bilingual-card .card-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bilingual-card .card-icon{font-size:20px}
.bilingual-card .card-title{font-weight:700;font-size:15px;color:#fff}
.bilingual-card .card-desc{font-size:12px;color:rgba(255,255,255,.8);margin-bottom:10px;line-height:1.4}
.bilingual-card .lang-tags{display:flex;align-items:center;gap:8px}
.bilingual-card .lang-tag{padding:4px 10px;border-radius:12px;background:rgba(255,255,255,.2);color:#fff;font-size:11px;font-weight:500}
.bilingual-card .chat-separator{color:rgba(255,255,255,.6);font-size:13px}
.tag{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tag-purple{background:var(--purple-bg);color:var(--purple)}
.tag-green{background:var(--green-bg);color:var(--green)}
.tag-blue{background:var(--blue-bg);color:var(--blue)}
.social-card{background:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.friend-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--white);border-radius:var(--radius-sm);margin-bottom:4px;cursor:pointer;transition:transform .15s}
.friend-item:hover{transform:scale(1.01)}
.friend-avatar{width:36px;height:36px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.friend-info{flex:1}
.friend-name{font-size:13px;font-weight:600}
.friend-status{font-size:11px;color:var(--text-light);margin-top:2px}
@media(max-width:900px){.phone{width:280px;height:560px}}
@media(max-width:600px){.phone{width:240px;height:480px;border-radius:24px}.phone-notch{width:80px;height:18px}}
</style>
</head>
<body>
<div class="phone-wrap">
<div class="phone">
<div class="phone-notch"></div>
<div class="phone-screen">
<div class="status-bar"><span class="time">9:41</span><span>📶 🔋 100%</span></div>
<div class="phone-content">
<div style="font-size:16px;font-weight:700;margin-bottom:12px;">👥 社交</div>
<div class="bilingual-card">
  <div class="card-header">
    <span class="card-icon">💬</span>
    <span class="card-title">双语聊天</span>
    <span class="tag tag-purple" style="margin-left:auto;background:rgba(255,255,255,.2);color:#fff;">✨ 新功能</span>
  </div>
  <p class="card-desc">与语言伙伴实时双语聊天，AI 自动翻译，边聊边学</p>
  <div class="lang-tags">
    <span class="lang-tag">🇨🇳 你说中文</span>
    <span class="chat-separator">↔</span>
    <span class="lang-tag">🇪🇸 TA说西语</span>
  </div>
</div>
<div class="social-card">
  <div style="font-weight:600;font-size:14px;margin-bottom:8px;">🤝 互助学习</div>
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
    <span class="tag tag-green" style="font-size:12px;">🇨🇳 中文</span>
    <span style="color:var(--text-lighter)">→</span>
    <span class="tag tag-blue" style="font-size:12px;">🇪🇸 西语</span>
  </div>
  <p style="font-size:12px;color:var(--text-light);">找到语言伙伴，互相纠正练习，一起进步！</p>
</div>
<div style="font-size:13px;font-weight:600;margin:10px 0 6px;">好友列表</div>
<div class="friend-item">
  <div class="friend-avatar">👩</div>
  <div class="friend-info">
    <div class="friend-name">Maria</div>
    <div class="friend-status">💬 聊天中</div>
  </div>
</div>
<div class="friend-item"><div class="friend-avatar">👨</div><div class="friend-info"><div class="friend-name">Carlos</div><div class="friend-status">🔥 8 天</div></div></div>
<div class="friend-item"><div class="friend-avatar">🧑</div><div class="friend-info"><div class="friend-name">Yuki</div><div class="friend-status">🔥 3 天</div></div></div>
</div>
<div class="tab-bar">
  <button class="tab-item"><span class="tab-icon">🏠</span>学习</button>
  <button class="tab-item"><span class="tab-icon">🏆</span>排行</button>
  <button class="tab-item active"><span class="tab-icon">👥</span>社交</button>
  <button class="tab-item"><span class="tab-icon">📖</span>单词</button>
  <button class="tab-item"><span class="tab-icon">👤</span>个人</button>
</div>
</div>
</div>
</div>
</body>
</html>
