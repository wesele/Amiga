name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Linux system deps (Tauri runtime)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev
      # content-studio/data/vocabulary.json is gitignored. The release builds
      # compile a Rust lib that `include_str!`s it; seed a minimal fixture if
      # missing. The real production data is regenerated by Content Studio
      # locally and committed via Content Studio's own sync before release.
      - name: Ensure vocabulary.json exists (CI minimal fixture)
        run: |
          mkdir -p content-studio/data
          if [ ! -f content-studio/data/vocabulary.json ]; then
            cat > content-studio/data/vocabulary.json <<'JSON'
          {
            "data": {
              "English": { "A1": "the, be, to" },
              "Espanol": { "A1": "el, ser, estar" },
              "中文":   { "A1": "的, 是, 我" }
            }
          }
          JSON
            echo "Created CI fixture vocabulary.json"
          fi
      - name: Restore Android SDK + NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/Android/Sdk
            ~/.gradle
          key: android-${{ runner.os }}-${{ hashFiles('src-tauri/gen/android/app/build.gradle.kts', 'src-tauri/gen/android/build.gradle.kts') }}
      # android-actions/setup-android@v3 解析 packages 时把整段当成一个包名，
      # 所以绕过去用 sdkmanager 直接装。GitHub runner 自带 cmdline-tools
      # 在 /usr/local/lib/android/sdk/cmdline-tools/<rev>/bin/，取第一个就是。
      - name: Install Android SDK packages
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          set -e
          SDKMANAGER=$(ls -d /usr/local/lib/android/sdk/cmdline-tools/*/bin/sdkmanager | head -1)
          echo "Using sdkmanager: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.0.12077973"
      - name: Decode release keystore
        env:
          AMIGA_KEYSTORE_BASE64: ${{ secrets.AMIGA_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$AMIGA_KEYSTORE_BASE64" ]; then
            echo "::error::Secret AMIGA_KEYSTORE_BASE64 is not set."
            exit 1
          fi
          mkdir -p src-tauri
          echo "$AMIGA_KEYSTORE_BASE64" | base64 -d > src-tauri/amiga-release.keystore
          ls -l src-tauri/amiga-release.keystore
      - name: npm ci
        run: npm ci
      - name: tauri android init
        run: npx tauri android init --ci
      - name: Apply Android patches (tracked Kotlin → gen/)
        run: node scripts/android-patch.cjs
      - name: Write keystore.properties from secrets
        env:
          AMIGA_KEYSTORE_PASSWORD: ${{ secrets.AMIGA_KEYSTORE_PASSWORD }}
          AMIGA_KEY_ALIAS: ${{ secrets.AMIGA_KEY_ALIAS }}
          AMIGA_KEY_PASSWORD: ${{ secrets.AMIGA_KEY_PASSWORD }}
        run: |
          for v in AMIGA_KEYSTORE_PASSWORD AMIGA_KEY_ALIAS AMIGA_KEY_PASSWORD; do
            if [ -z "${!v}" ]; then
              echo "::error::Secret $v is not set."
              exit 1
            fi
          done
          cat > src-tauri/gen/android/app/keystore.properties <<EOF
          storeFile=../../../amiga-release.keystore
          storePassword=${AMIGA_KEYSTORE_PASSWORD}
          keyAlias=${AMIGA_KEY_ALIAS}
          keyPassword=${AMIGA_KEY_PASSWORD}
          EOF
          echo "--- keystore.properties (storeFile visible, secrets redacted) ---"
          awk -F= 'BEGIN{OFS="="} {if($1=="storeFile") print $1,$2; else print $1,"<REDACTED>"}' \
            src-tauri/gen/android/app/keystore.properties
          echo "--- keystore file ---"
          ls -l src-tauri/amiga-release.keystore
          test -f src-tauri/amiga-release.keystore && echo "keystore file exists" || echo "::error::keystore file MISSING"
          echo "--- hexdump first 16 bytes (PKCS12 magic) ---"
          head -c 16 src-tauri/amiga-release.keystore | od -c | head -2
      - name: Build APK (aarch64)
        run: npx tauri android build --target aarch64 --apk
      - name: Verify produced APK is signed
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced"
            exit 1
          fi
          echo "APK: $APK ($(stat -c%s "$APK") bytes)"
          BASENAME=$(basename "$APK")
          if [[ "$BASENAME" == *-unsigned.apk ]]; then
            echo "::warning::APK is unsigned; keystore.properties was not picked up by build.gradle.kts"
            echo "--- keystore.properties ---"
            sed 's/Password=.*/Password=<REDACTED>/' src-tauri/gen/android/app/keystore.properties
            echo "--- keystore file ---"
            ls -l src-tauri/amiga-release.keystore
          else
            echo "✓ APK is signed: $BASENAME"
          fi
      - name: Collect APK
        run: |
          mkdir -p dist-artifacts
          # Match both signed (app-*-release.apk) and unsigned
          # (app-*-release-unsigned.apk) outputs. The presence of -unsigned
          # in the filename means the signingConfig in build.gradle.kts
          # didn't pick up keystore.properties — investigate separately.
          find src-tauri/gen/android/app/build/outputs/apk -type f -name '*.apk' \
            -exec cp {} dist-artifacts/ \;
          ls -l dist-artifacts/
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amiga-android-apk
          path: dist-artifacts/*.apk
          if-no-files-found: error

  windows:
    name: Windows (MSI/NSIS/EXE)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      # Same minimal fixture as the Android job. Use PowerShell on Windows
      # because the default `bash` on windows-latest does not support the
      # heredoc-with-newline form we use on Linux.
      - name: Ensure vocabulary.json exists (CI minimal fixture)
        shell: pwsh
        run: |
          $dir = 'content-studio/data'
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $file = Join-Path $dir 'vocabulary.json'
          if (Test-Path -LiteralPath $file) { exit 0 }
          @'
          {
            "data": {
              "English": { "A1": "the, be, to" },
              "Espanol": { "A1": "el, ser, estar" },
              "中文":   { "A1": "的, 是, 我" }
            }
          }
          '@ | Set-Content -LiteralPath $file -Encoding utf8
      - name: npm ci
        run: npm ci
      - name: Build Tauri bundle
        run: npx tauri build
      - name: Collect Windows installers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          Get-ChildItem -Path src-tauri/target/release/bundle/msi,src-tauri/target/release/bundle/nsis -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Extension -in '.msi','.exe' } |
            Copy-Item -Destination dist-artifacts/
          Get-ChildItem -Path dist-artifacts -Recurse
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amiga-windows-installer
          path: dist-artifacts/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [android, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Rename APK to versioned filename
        run: |
          version="${GITHUB_REF_NAME#v}"
          find artifacts/amiga-android-apk -maxdepth 1 -type f -name '*.apk' \
            -execdir mv {} "amiga-v${version}.apk" \;
          find artifacts -type f | sort
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/amiga-android-apk/*
            artifacts/amiga-windows-installer/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
