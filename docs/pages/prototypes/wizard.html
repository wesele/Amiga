<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>阿米加 - 新用户向导</title>
<style>
:root{--green:#58cc02;--green-hover:#46a302;--green-bg:#eaffd6;--blue:#1cb0f6;--blue-hover:#1899d6;--blue-bg:#ddf4ff;--orange:#ff9600;--orange-hover:#e08500;--orange-bg:#fff0d6;--red:#ff4b4b;--red-bg:#ffe0e0;--purple:#7c3aed;--purple-bg:#ede9fe;--pink:#ec4899;--pink-bg:#fce7f3;--text:#3a3a3a;--text-light:#777;--text-lighter:#aaa;--bg:#f5f5f5;--white:#fff;--border:#e5e5e5;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 12px 48px rgba(0,0,0,.22);--radius:12px;--radius-sm:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;font-size:15px;color:var(--text);background:#f5f5f5}
.phone{width:320px;height:768px;background:var(--white);border-radius:44px;box-shadow:0 12px 48px rgba(0,0,0,.22),inset 0 0 0 1px rgba(255,255,255,.1);border:3px solid #1a1a1a;position:relative;box-sizing:content-box;overflow:hidden;flex-shrink:0}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:30px;background:#1a1a1a;border-radius:0 0 20px 20px;z-index:20}
.phone-notch::after{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;border:2px solid #333;background:transparent}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;background:var(--white)}
.phone-screen::-webkit-scrollbar{width:0}
.phone-content{padding:38px 20px 0;display:flex;flex-direction:column;min-height:calc(100% - 38px)}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 24px 4px;font-size:12px;font-weight:700;background:var(--white);position:absolute;top:0;left:0;right:0;z-index:15;color:#1a1a1a;height:36px}
.status-bar .time{font-weight:800;font-size:13px}
.status-icons{display:flex;align-items:center;gap:4px;font-size:11px}
/* Step indicator */
.step-indicator{display:flex;align-items:center;justify-content:center;gap:0;padding:16px 0 24px}
.step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:var(--border);color:var(--text-lighter);transition:all .3s;flex-shrink:0;position:relative}
.step-dot.active{background:var(--green);color:#fff;box-shadow:0 0 0 4px var(--green-bg)}
.step-dot.done{background:var(--green);color:#fff}
.step-line{flex:1;height:2px;background:var(--border);margin:0 6px;transition:background .3s;max-width:48px}
.step-line.done{background:var(--green)}
/* Wizard steps */
.wizard-step{display:none;flex-direction:column;flex:1;animation:fadeIn .3s ease}
.wizard-step.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.step-title{font-size:22px;font-weight:800;text-align:center;margin-bottom:4px}
.step-sub{font-size:13px;color:var(--text-light);text-align:center;margin-bottom:24px;line-height:1.4}
/* Welcome logo */
.welcome-logo{text-align:center;margin-bottom:16px}
.welcome-logo .logo-icon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--green),#46a302);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:#fff;margin:0 auto 12px;box-shadow:0 4px 16px rgba(88,204,2,.25)}
.welcome-logo .app-name{font-size:24px;font-weight:800;color:var(--green)}
.welcome-logo .tagline{font-size:12px;color:var(--text-lighter);margin-top:2px}
/* Form fields */
.form-group{margin-bottom:16px}
.form-label{font-size:13px;font-weight:600;color:var(--text-light);margin-bottom:6px;display:block}
.form-input{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:14px;font-family:inherit;transition:border-color .2s;outline:none;background:var(--white)}
.form-input:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-bg)}
.pill-group{display:flex;gap:8px;flex-wrap:wrap}
.pill{display:flex;align-items:center;justify-content:center;padding:10px 18px;border-radius:24px;border:1px solid var(--border);background:var(--white);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;min-width:48px}
.pill:hover{border-color:var(--green);color:var(--green)}
.pill.selected{background:var(--green);color:#fff;border-color:var(--green)}
.pill.small{padding:8px 14px;font-size:12px}
.avatar-select{display:flex;gap:8px;align-items:center;margin:8px 0}
.avatar-circle{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;border:2px solid transparent;transition:all .15s;background:var(--bg)}
.avatar-circle:hover{border-color:var(--green)}
.avatar-circle.selected{border-color:var(--green);background:var(--green-bg);border-width:3px}
.avatar-circle.add{background:var(--green-bg);color:var(--green);font-size:18px;font-weight:700;border-style:dashed}
/* Wizard footer */
.wizard-footer{margin-top:auto;padding:16px 0 24px;display:flex;flex-direction:column;gap:8px}
.btn-primary{width:100%;padding:14px;border-radius:var(--radius-sm);background:var(--green);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:all .15s;font-family:inherit;text-align:center}
.btn-primary:hover{background:var(--green-hover);transform:translateY(-1px);box-shadow:0 4px 12px rgba(88,204,2,.3)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-link{background:none;border:none;color:var(--text-light);font-size:13px;cursor:pointer;text-align:center;padding:8px;font-family:inherit;transition:color .15s}
.btn-link:hover{color:var(--green)}
/* Completion */
.completion{text-align:center;padding:40px 0;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.completion .big-icon{font-size:64px;margin-bottom:16px;animation:bounce .6s ease}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.completion h2{font-size:24px;font-weight:800;margin-bottom:8px}
.completion p{color:var(--text-light);font-size:14px;line-height:1.5;margin-bottom:4px}
.confetti{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden}
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall 2s ease forwards}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(768px) rotate(720deg);opacity:0}}
body.embed{background:#e8e8e8;display:flex;align-items:center;justify-content:center;min-height:100vh}
body.embed .phone{margin:10px auto}
</style>
</head>
<body>
<script>(function(){if(location.search.indexOf('embed=1')>=0)document.body.className='embed';})();</script>
<div class="phone" style="position:relative;">
<div class="phone-notch"></div>
<div class="phone-screen">
<div class="status-bar"><span class="time">9:41</span><span class="status-icons">📶 5G 🔋 100%</span></div>
<div class="phone-content">

  <!-- Step indicator -->
  <div class="step-indicator" id="stepIndicator">
    <div class="step-dot active" id="sdot0">1</div>
    <div class="step-line" id="sline1"></div>
    <div class="step-dot" id="sdot1">2</div>
    <div class="step-line" id="sline2"></div>
    <div class="step-dot" id="sdot2">3</div>
  </div>

  <!-- Step 1: Basic Info -->
  <div class="wizard-step active" id="step0">
    <div class="welcome-logo">
      <div class="logo-icon">A</div>
      <div class="app-name">阿米加</div>
      <div class="tagline">学语言，连世界</div>
    </div>
    <div class="step-title">完善个人资料</div>
    <div class="step-sub">让我们更好地了解你</div>

    <div class="form-group">
      <div class="form-label">头像</div>
      <div class="avatar-select">
        <div class="avatar-circle selected">😊</div>
        <div class="avatar-circle">😎</div>
        <div class="avatar-circle">🤓</div>
        <div class="avatar-circle">🌸</div>
        <div class="avatar-circle">🦊</div>
        <div class="avatar-circle add">+</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="nickname">昵称</label>
      <input class="form-input" id="nickname" type="text" placeholder="你的学习昵称" value="学习者">
    </div>

    <div class="form-group">
      <div class="form-label">母语</div>
      <div class="pill-group">
        <button class="pill selected">🇨🇳 中文</button>
        <button class="pill">🇬🇧 English</button>
        <button class="pill">🇪🇸 Español</button>
        <button class="pill">🇯🇵 日本語</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="country">国家/地区</label>
      <select class="form-input" id="country" style="appearance:none;background:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22><path d=%22M2 4l4 4 4-4%22 fill=%22%23777%22/></svg>') no-repeat right 12px center">
        <option>🇨🇳 中国</option>
        <option>🇪🇸 西班牙</option>
        <option>🇲🇽 墨西哥</option>
        <option>🇦🇷 阿根廷</option>
        <option>🇺🇸 美国</option>
        <option>🇯🇵 日本</option>
      </select>
    </div>

    <div class="form-group">
      <div class="form-label">性别 <span style="color:var(--text-lighter);font-weight:400;">（选填）</span></div>
      <div class="pill-group">
        <button class="pill">男</button>
        <button class="pill">女</button>
        <button class="pill selected">不公开</button>
      </div>
    </div>

    <div class="form-group">
      <div class="form-label">出生年份 <span style="color:var(--text-lighter);font-weight:400;">（选填）</span></div>
      <select class="form-input" style="appearance:none;background:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22><path d=%22M2 4l4 4 4-4%22 fill=%22%23777%22/></svg>') no-repeat right 12px center">
        <option value="">选择出生年份</option>
        <option>2010s</option>
        <option>2000s</option>
        <option>1990s</option>
        <option>1980s</option>
        <option>1970s</option>
        <option>1960s 及更早</option>
      </select>
    </div>

    <div class="wizard-footer">
      <button class="btn-primary" onclick="nextStep()">下一步</button>
      <button class="btn-link" onclick="nextStep()">跳过，以后再说</button>
    </div>
  </div>

  <!-- Step 2: Learning Goals -->
  <div class="wizard-step" id="step1">
    <div class="step-title">设定学习目标</div>
    <div class="step-sub">为你定制专属学习路径</div>

    <div class="form-group">
      <div class="form-label">目标语言（可多选）</div>
      <div class="pill-group">
        <button class="pill selected">🇪🇸 西班牙语</button>
        <button class="pill">🇨🇳 中文</button>
        <button class="pill">🇬🇧 英语</button>
        <button class="pill">🇯🇵 日语</button>
        <button class="pill">🇫🇷 法语</button>
      </div>
    </div>

    <div class="form-group">
      <div class="form-label">当前水平</div>
      <div class="pill-group">
        <button class="pill selected">零基础</button>
        <button class="pill">初级 (A1-A2)</button>
        <button class="pill">中级 (B1-B2)</button>
        <button class="pill">高级 (C1)</button>
      </div>
    </div>

    <div class="form-group">
      <div class="form-label">学习目标</div>
      <div class="pill-group">
        <button class="pill selected">日常对话</button>
        <button class="pill">旅行交流</button>
        <button class="pill">考试准备</button>
        <button class="pill">流利掌握</button>
      </div>
    </div>

    <div class="form-group">
      <div class="form-label">每天学习时间</div>
      <div class="pill-group">
        <button class="pill">5 分钟</button>
        <button class="pill selected">15 分钟</button>
        <button class="pill">30 分钟</button>
        <button class="pill">1 小时+</button>
      </div>
    </div>

    <div class="wizard-footer">
      <button class="btn-primary" onclick="nextStep()">开始学习！</button>
    </div>
  </div>

  <!-- Step 3: Completion -->
  <div class="wizard-step" id="step2">
    <div class="completion">
      <div class="big-icon">🎉</div>
      <h2>准备好了！</h2>
      <p>你的专属学习路径已生成</p>
      <p style="font-size:12px;color:var(--text-lighter);margin-top:6px;">基于你的目标和水平，我们为你推荐了<br>A1 西班牙语入门课程</p>
    </div>
    <div class="wizard-footer">
      <button class="btn-primary" onclick="parent.postMessage({type:'nav',prototype:'home'},'*')">开始学习 →</button>
    </div>
  </div>

</div><!-- /phone-content -->
</div><!-- /phone-screen -->
</div><!-- /phone -->

<script>
var currentStep = 0;
var steps = [0,1,2];

function updateIndicator() {
  for (var i = 0; i <= 2; i++) {
    var dot = document.getElementById('sdot'+i);
    dot.className = 'step-dot' + (i < currentStep ? ' done' : '') + (i === currentStep ? ' active' : '');
  }
  for (var i = 1; i <= 2; i++) {
    var line = document.getElementById('sline'+i);
    line.className = 'step-line' + (i <= currentStep ? ' done' : '');
  }
}

function nextStep() {
  if (currentStep < 2) {
    document.getElementById('step' + currentStep).classList.remove('active');
    currentStep++;
    document.getElementById('step' + currentStep).classList.add('active');
    updateIndicator();
    document.querySelector('.phone-screen').scrollTop = 0;
  }
}

function prevStep() {
  if (currentStep > 0) {
    document.getElementById('step' + currentStep).classList.remove('active');
    currentStep--;
    document.getElementById('step' + currentStep).classList.add('active');
    updateIndicator();
  }
}

// Pill toggle
document.querySelectorAll('.pill-group').forEach(function(group) {
  group.querySelectorAll('.pill').forEach(function(pill) {
    pill.addEventListener('click', function() {
      var parent = this.parentElement;
      // For multi-select (language), allow multiple
      if (parent.closest('.form-group') && parent.closest('.form-group').querySelector('.form-label') && parent.closest('.form-group').querySelector('.form-label').textContent.includes('可多选')) {
        this.classList.toggle('selected');
      } else {
        parent.querySelectorAll('.pill').forEach(function(p) { p.classList.remove('selected'); });
        this.classList.add('selected');
      }
    });
  });
});

// Avatar selection
document.querySelectorAll('.avatar-circle').forEach(function(c) {
  c.addEventListener('click', function() {
    document.querySelectorAll('.avatar-circle').forEach(function(x) { x.classList.remove('selected'); });
    this.classList.add('selected');
  });
});
</script>
</body>
</html>
