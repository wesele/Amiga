<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>阿米加 - AI 口语练习</title>
<style>
:root{--green:#58cc02;--green-hover:#46a302;--green-bg:#eaffd6;--blue:#1cb0f6;--blue-hover:#1899d6;--blue-bg:#ddf4ff;--orange:#ff9600;--orange-hover:#e08500;--orange-bg:#fff0d6;--red:#ff4b4b;--red-bg:#ffe0e0;--purple:#7c3aed;--purple-bg:#ede9fe;--pink:#ec4899;--pink-bg:#fce7f3;--text:#2d2d2d;--text-light:#777;--text-lighter:#aaa;--bg:#f5f5f5;--white:#fff;--border:#e5e5e5;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 12px 48px rgba(0,0,0,.22);--radius:12px;--radius-sm:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;font-size:15px;color:var(--text);background:#f5f5f5}
.phone{width:320px;height:768px;background:var(--white);border-radius:44px;box-shadow:0 12px 48px rgba(0,0,0,.22),inset 0 0 0 1px rgba(255,255,255,.1);border:3px solid #1a1a1a;position:relative;box-sizing:content-box;overflow:hidden;flex-shrink:0}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:30px;background:#1a1a1a;border-radius:0 0 20px 20px;z-index:20}
.phone-notch::after{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;border:2px solid #333;background:transparent}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;background:var(--white)}
.phone-screen::-webkit-scrollbar{width:0}
.phone-content{padding:38px 16px 0;display:flex;flex-direction:column;min-height:calc(100% - 0px)}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 24px 4px;font-size:12px;font-weight:700;background:var(--white);position:absolute;top:0;left:0;right:0;z-index:15;color:#1a1a1a;height:36px}
.status-bar .time{font-weight:800;font-size:13px}
.status-icons{display:flex;align-items:center;gap:4px;font-size:11px}
.screen-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-top:2px}
.back-btn{background:none;border:none;font-size:22px;cursor:pointer;font-family:inherit;padding:4px;color:var(--text);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.back-btn:hover{background:var(--bg)}
.screen-title{font-weight:700;font-size:15px}
.ai-avatar-circle{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 2px 8px rgba(124,58,237,.3)}
.tag{display:inline-block;padding:3px 12px;border-radius:50px;font-size:11px;font-weight:600;margin-left:auto}
.tag-purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(124,58,237,.15)}
.chat-hint{text-align:center;font-size:11px;color:var(--text-lighter);margin-bottom:8px;padding:8px 12px;background:var(--bg);border-radius:var(--radius-sm)}
.chat-container{flex:1;display:flex;flex-direction:column;gap:14px;padding:8px 0;overflow-y:auto;min-height:0}
.msg{display:flex;gap:8px;align-items:flex-start;max-width:100%}
.msg.user{flex-direction:row-reverse}
.msg .avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg .avatar.bot{background:linear-gradient(135deg,var(--purple-bg),#ddd6fe);font-size:15px}
.msg .avatar.user{background:var(--green-bg);font-size:15px}
.msg .bubble{max-width:78%;padding:12px 16px;font-size:13px;line-height:1.5;word-break:break-word}
.msg .bubble.bot{background:var(--bg);border-radius:4px 16px 16px 16px;border:1px solid var(--border);color:var(--text)}
.msg .bubble.user{background:linear-gradient(135deg,var(--green),var(--green-hover));color:#fff;border-radius:16px 4px 16px 16px;box-shadow:0 2px 8px rgba(88,204,2,.2)}
.feedback{display:flex;align-items:center;gap:5px;margin-top:8px;padding:8px 12px;background:var(--green-bg);border-radius:var(--radius-sm);font-size:12px;font-weight:600;color:var(--green);border:1px solid rgba(88,204,2,.15)}
.input-area{display:flex;gap:8px;padding:12px 0;border-top:1px solid var(--border);background:var(--white);position:sticky;bottom:0;z-index:5;margin-top:8px}
.chat-input{flex:1;padding:12px 18px;border-radius:50px;border:2px solid var(--border);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.chat-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.send-btn{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;padding:12px 22px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;box-shadow:0 2px 8px rgba(124,58,237,.25)}
.send-btn:hover{transform:scale(1.03);box-shadow:0 4px 14px rgba(124,58,237,.35)}
body.embed{background:#e8e8e8;display:flex;align-items:center;justify-content:center;min-height:100vh}
body.embed .phone{margin:10px auto}
</style>
</head>
<body>
<script>(function(){if(location.search.indexOf('embed=1')>=0)document.body.className='embed';})();</script>
<div class="phone">
<div class="phone-notch"></div>
<div class="phone-screen">
<div class="status-bar"><span class="time">9:41</span><span class="status-icons">📶 5G 🔋 100%</span></div>
<div class="phone-content">
<div class="screen-header">
  <button class="back-btn">←</button>
  <div class="ai-avatar-circle">🤖</div>
  <span class="screen-title">AI 口语练习</span>
  <span class="tag tag-purple">餐厅场景</span>
</div>
<div class="chat-hint">💡 尝试用西班牙语与 AI 对话练习口语</div>
<div class="chat-container">
  <div class="msg">
    <div class="avatar bot">🤖</div>
    <div class="bubble bot">¡Hola! ¿Qué te gustaría pedir hoy?</div>
  </div>
  <div class="msg user">
    <div class="avatar user">🧑</div>
    <div class="bubble user">Hola, quiero un café por favor.</div>
  </div>
  <div class="msg">
    <div class="avatar bot">🤖</div>
    <div class="bubble bot">
      ¡Muy bien! ¿Algo más?
      <div class="feedback">✅ 语法正确，发音良好</div>
    </div>
  </div>
</div>
<div class="input-area">
  <input type="text" class="chat-input" placeholder="输入你的回答...">
  <button class="send-btn">发送</button>
</div>
</div>
</div>
</div>
</body>
</html>
