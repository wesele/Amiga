<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idioma 产品交互设计文档</title>
<style>
:root {
  --green: #58cc02; --green-bg: #eaffd6;
  --blue: #1cb0f6; --blue-bg: #ddf4ff;
  --text: #3a3a3a; --text-light: #777; --text-lighter: #aaa;
  --bg: #f7f7f7; --white: #fff; --border: #e5e5e5;
  --shadow: 0 2px 12px rgba(0,0,0,.08);
  --radius: 12px; --radius-sm: 8px;
  --sidebar-w: 240px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  display: flex; height: 100vh;
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;
  font-size: 14px; color: var(--text); background: var(--bg);
}

/* Sidebar */
.sidebar {
  width: var(--sidebar-w); height: 100vh; overflow-y: auto;
  background: var(--white); border-right: 1px solid var(--border);
  flex-shrink: 0; display: flex; flex-direction: column;
}
.sidebar-logo { padding: 16px 16px 12px; border-bottom: 1px solid var(--border); }
.sidebar-logo h1 { font-size: 18px; color: var(--green); display: flex; align-items: center; gap: 8px; }
.sidebar-logo h1 span { background: var(--green); color: #fff; width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }
.sidebar-logo .sub { font-size: 10px; color: var(--text-lighter); margin-top: 1px; }
.sidebar .scroll { flex: 1; overflow-y: auto; padding: 8px 0; }
.sidebar .group { padding: 12px 16px 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-lighter); font-weight: 600; }
.sidebar a {
  display: flex; align-items: center; gap: 8px; padding: 8px 16px;
  color: var(--text-light); text-decoration: none; font-size: 13px;
  border-left: 3px solid transparent; transition: all .15s; cursor: pointer;
}
.sidebar a:hover { background: var(--green-bg); color: var(--text); }
.sidebar a.active { color: var(--green); border-left-color: var(--green); background: var(--green-bg); font-weight: 600; }

/* Main content */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#contentFrame {
  flex: 1; width: 100%; border: none;
  background: var(--white);
}

/* Mobile */
@media (max-width: 700px) {
  .sidebar { display: none; }
  body.mobile-nav .sidebar { display: flex; position: fixed; z-index: 100; width: 100%; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1><span>I</span> Idioma</h1>
    <div class="sub">Product Design Document v0.1</div>
  </div>
  <div class="scroll">
    <div class="group">文档</div>
    <a onclick="loadSection('vision')" class="active">🎯 产品定位</a>
    <a onclick="loadSection('languages')">🌐 语言支持</a>
    <a onclick="loadSection('structure')">📚 内容结构</a>
    <a onclick="loadSection('exercises')">✍️ 练习题型</a>
    <a onclick="loadSection('gamification')">🎮 游戏化系统</a>
    <a onclick="loadSection('navigation')">📱 导航与 UI</a>
    <a onclick="loadSection('colors')">🎨 设计语言</a>
    <a onclick="loadSection('schema')">🗄️ 数据模型</a>
    <a onclick="loadSection('ai')">🤖 AI 功能</a>
    <a onclick="loadSection('roadmap')">🗺️ 开发路线图</a>
    <a onclick="loadSection('modules')">🧩 模块架构</a>

    <div class="group">原型</div>
    <a onclick="loadPrototype('home')">🏠 学习首页</a>
    <a onclick="loadPrototype('exercise')">✏️ 练习答题</a>
    <a onclick="loadPrototype('complete')">🎉 关卡完成</a>
    <a onclick="loadPrototype('leaderboard')">🏆 排行榜</a>
    <a onclick="loadPrototype('profile')">👤 个人资料</a>
    <a onclick="loadPrototype('social')">👥 社交</a>
    <a onclick="loadPrototype('bilingual-chat')">💬 双语聊天</a>
    <a onclick="loadPrototype('ai-chat')">🤖 AI 口语</a>
  </div>
</aside>

<!-- Content -->
<main class="main">
  <iframe id="contentFrame" name="contentFrame"></iframe>
</main>

<script>
function loadSection(name) {
  var frame = document.getElementById('contentFrame');
  frame.src = 'pages/sections/' + name + '.html?embed=1';
  // Highlight active nav
  document.querySelectorAll('.sidebar a').forEach(function(a) { a.classList.remove('active'); });
  var links = document.querySelectorAll('.sidebar a');
  for (var i = 0; i < links.length; i++) {
    if (links[i].textContent.indexOf(name) > 0 || links[i].getAttribute('onclick').indexOf(name) >= 0) {
      // Cannot match easily, let's just find the right one
    }
  }
}

function loadPrototype(name) {
  document.getElementById('contentFrame').src = 'pages/prototypes/' + name + '.html?embed=1';
}

// Set active state on click
document.querySelectorAll('.sidebar a').forEach(function(a) {
  a.addEventListener('click', function() {
    document.querySelectorAll('.sidebar a').forEach(function(x) { x.classList.remove('active'); });
    this.classList.add('active');
  });
});

// Load default page
loadSection('vision');
</script>
</body>
</html>
