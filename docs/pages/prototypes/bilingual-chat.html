<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Idioma - 双语聊天</title>
<style>
:root{--green:#58cc02;--green-hover:#46a302;--green-bg:#eaffd6;--blue:#1cb0f6;--blue-hover:#1899d6;--blue-bg:#ddf4ff;--orange:#ff9600;--orange-hover:#e08500;--orange-bg:#fff0d6;--red:#ff4b4b;--red-bg:#ffe0e0;--purple:#7c3aed;--purple-bg:#ede9fe;--pink:#ec4899;--pink-bg:#fce7f3;--text:#3a3a3a;--text-light:#777;--text-lighter:#aaa;--bg:#f7f7f7;--white:#fff;--border:#e5e5e5;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 30px rgba(0,0,0,.12);--radius:12px;--radius-sm:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;font-size:15px;color:var(--text);background:#e8e8e8}
.phone-wrap{display:flex;justify-content:center;margin:30px 0}
.phone{width:320px;height:640px;background:var(--white);border-radius:40px;box-shadow:var(--shadow-lg);border:2px solid #ddd;position:relative;overflow:hidden;flex-shrink:0}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:24px;background:#222;border-radius:0 0 16px 16px;z-index:10}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg)}
.phone-screen::-webkit-scrollbar{width:0}
.phone-content{padding:8px 16px 60px}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 20px 6px;font-size:11px;font-weight:600;background:var(--white);position:sticky;top:0;z-index:5}
.status-bar .time{font-weight:700}
.screen-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.back-btn{background:none;border:none;font-size:20px;cursor:pointer;font-family:inherit;padding:0}
.screen-subtitle{font-size:10px;color:var(--text-lighter)}
.tag{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tag-purple{background:var(--purple-bg);color:var(--purple)}
.chat-avatar-header{width:32px;height:32px;border-radius:50%;background:var(--purple-bg);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.chat-name{font-weight:600;font-size:14px}
.chat-container{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.chat-msg{display:flex;gap:8px;align-items:flex-start}
.chat-msg.self{flex-direction:row-reverse}
.chat-msg .avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.chat-msg .avatar-purple{background:var(--purple-bg)}
.chat-msg .avatar-green{background:var(--green-bg)}
.chat-bubble{max-width:85%}
.chat-bubble .text{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.4}
.chat-bubble .text.incoming{background:var(--bg);border-radius:0 12px 12px 12px}
.chat-bubble .text.outgoing{background:var(--green);color:#fff;border-radius:12px 0 12px 12px}
.chat-translation{padding:6px 12px;border-radius:12px;font-size:11px;margin-top:3px;display:inline-block}
.chat-translation.purple{background:var(--purple-bg);color:var(--purple)}
.chat-translation.green{background:var(--green-bg);color:var(--green)}
.vocab-word{background:var(--orange-bg);padding:2px 8px;border-radius:6px;font-size:12px;cursor:pointer;position:relative;display:inline-block;transition:all .15s;border-bottom:2px solid var(--orange)}
.vocab-word:hover{background:var(--orange);color:#fff;transform:scale(1.05)}
.chat-input-area{display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--border)}
.chat-input{flex:1;padding:10px 14px;border-radius:50px;border:2px solid var(--border);font-size:13px;font-family:inherit;outline:none}
.chat-input:focus{border-color:var(--purple)}
.chat-send-btn{background:var(--purple);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;font-family:inherit}
.chat-footer{display:flex;gap:4px;margin-top:6px;font-size:10px;color:var(--text-lighter);justify-content:center}
.chat-footer .clickable{cursor:pointer;color:var(--purple);font-weight:500}
.chat-footer .clickable:hover{text-decoration:underline}
.chat-footer .dot{color:var(--text-lighter)}
@media(max-width:900px){.phone{width:280px;height:560px}}
@media(max-width:600px){.phone{width:240px;height:480px;border-radius:24px}.phone-notch{width:80px;height:18px}}
</style>
</head>
<body>
<div class="phone-wrap">
<div class="phone">
<div class="phone-notch"></div>
<div class="phone-screen">
<div class="status-bar"><span class="time">9:41</span><span>📶 🔋 100%</span></div>
<div class="phone-content">
<div class="screen-header">
  <button class="back-btn">←</button>
  <div class="chat-avatar-header">👩</div>
  <div style="flex:1">
    <div class="chat-name">Maria</div>
    <div class="screen-subtitle">🇪🇸 西语母语 · 学习中文</div>
  </div>
  <span class="tag tag-purple">💬 双语</span>
</div>
<div class="chat-container">
  <div class="chat-msg">
    <div class="avatar avatar-purple">👩</div>
    <div class="chat-bubble">
      <div class="text incoming">¡Hola! ¿Cómo estás hoy?</div>
      <div class="chat-translation purple">🤖 你好！你今天怎么样？</div>
    </div>
  </div>
  <div class="chat-msg self">
    <div class="avatar avatar-green">🧑</div>
    <div class="chat-bubble">
      <div class="text outgoing">我很好！今天学了一些西班牙语单词。</div>
      <div class="chat-translation green">🤖 ¡Estoy muy bien! Hoy aprendí algunas palabras en español.</div>
    </div>
  </div>
  <div class="chat-msg">
    <div class="avatar avatar-purple">👩</div>
    <div class="chat-bubble">
      <div class="text incoming">¡Qué bien! ¿Qué palabras <span class="vocab-word" data-word="aprendiste">📘 aprendiste</span>?</div>
      <div class="chat-translation purple">🤖 太好了！你学了哪些单词？</div>
    </div>
  </div>
</div>
<div class="chat-input-area">
  <input type="text" class="chat-input" placeholder="输入消息（中文自动翻译西语）...">
  <button class="chat-send-btn">➤</button>
</div>
<div class="chat-footer">
  <span>🤖 AI 实时翻译</span>
  <span class="dot">·</span>
  <span class="clickable">点击译文学单词</span>
  <span class="dot">·</span>
  <span>💎 +2 XP/条</span>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
