<div class="screen-header">
  <button class="back-btn" data-screen="scrHome">←</button>
  <div class="ai-avatar-circle">🤖</div>
  <span class="screen-title">AI 口语练习</span>
  <span class="tag tag-purple" style="margin-left:auto;">餐厅场景</span>
</div>

<div class="ai-chat-container">
  <div class="ai-msg">
    <div class="ai-avatar bot">🤖</div>
    <div class="ai-bubble bot">¡Hola! ¿Qué te gustaría pedir hoy?</div>
  </div>

  <div class="ai-msg user">
    <div class="ai-avatar user">🧑</div>
    <div class="ai-bubble user">Hola, quiero un café por favor.</div>
  </div>

  <div class="ai-msg">
    <div class="ai-avatar bot">🤖</div>
    <div class="ai-bubble bot">
      ¡Muy bien! ¿Algo más?
      <div class="ai-feedback"><span>✅</span> 语法正确，发音良好</div>
    </div>
  </div>
</div>

<div class="ai-input-area">
  <input type="text" class="chat-input" placeholder="输入你的回答...">
  <button class="ai-send-btn">发送</button>
</div>
