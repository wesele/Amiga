<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图标尺寸对比</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      width: 480px;
    }
    h1 { font-size: 16px; margin: 0 0 12px; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8vw;
      margin-bottom: 24px;
    }
    .tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6em;
      width: 100%;
      aspect-ratio: 1;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .icon-16 { font-size: 16vw; line-height: 1; }
    .icon-12 { font-size: 12vw; line-height: 1; }
    .label {
      font-size: clamp(14px, 5vw, 18px);
      font-weight: 600;
    }
    .caption {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <h1>学习页图标对比（480px 宽）</h1>
  <div class="row">
    <div>
      <div class="tile">
        <span class="icon-16">📰</span>
        <span class="label">新闻</span>
      </div>
      <div class="caption">改前 16vw</div>
    </div>
    <div>
      <div class="tile">
        <span class="icon-12">📰</span>
        <span class="label">新闻</span>
      </div>
      <div class="caption">当前 12vw（75%）</div>
    </div>
  </div>
</body>
</html>
