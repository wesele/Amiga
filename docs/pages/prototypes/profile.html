<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>阿米加 - 个人</title>
<style>
:root{--green:#58cc02;--green-hover:#46a302;--green-bg:#eaffd6;--blue:#1cb0f6;--blue-bg:#ddf4ff;--orange:#ff9600;--orange-hover:#e08500;--orange-bg:#fff0d6;--red:#ff4b4b;--red-bg:#ffe0e0;--purple:#7c3aed;--purple-bg:#ede9fe;--gold:#ffc800;--gold-bg:#fff8d6;--pink:#ec4899;--pink-bg:#fce7f3;--text:#3a3a3a;--text-light:#777;--text-lighter:#aaa;--bg:#f5f5f5;--white:#fff;--border:#e5e5e5;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 12px 48px rgba(0,0,0,.22);--radius:12px;--radius-sm:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;font-size:15px;color:var(--text);background:#f5f5f5}
.phone{width:320px;height:768px;background:var(--white);border-radius:44px;box-shadow:0 12px 48px rgba(0,0,0,.22),inset 0 0 0 1px rgba(255,255,255,.1);border:3px solid #1a1a1a;position:relative;box-sizing:content-box;overflow:hidden;flex-shrink:0}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:30px;background:#1a1a1a;border-radius:0 0 20px 20px;z-index:20}
.phone-notch::after{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;border:2px solid #333;background:transparent}
.phone-screen{width:100%;height:100%;display:flex;flex-direction:column;background:var(--white)}
.phone-content{padding:38px 0 0;flex:1;overflow-y:auto;min-height:0}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 24px 4px;font-size:12px;font-weight:700;background:var(--white);position:absolute;top:0;left:0;right:0;z-index:15;color:#1a1a1a;height:36px}
.status-bar .time{font-weight:800;font-size:13px}
.status-icons{display:flex;align-items:center;gap:4px;font-size:11px}
.tab-bar{display:flex;background:var(--white);border-top:1px solid var(--border);flex-shrink:0;padding:4px 0;justify-content:space-around}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 8px;cursor:pointer;border:none;background:none;font-size:10px;color:var(--text-lighter);transition:all .2s;font-family:inherit}
.tab-item .tab-icon{font-size:20px;line-height:1}
.tab-item .tab-label{font-size:10px;font-weight:500}
.tab-item.active{color:var(--green);position:relative}
.tab-item.active::after{content:'';position:absolute;top:-1px;width:20px;height:3px;background:var(--green);border-radius:0 0 3px 3px}
/* Profile header */
.profile-cover{height:80px;background:linear-gradient(135deg,var(--green),#46a302);position:relative}
.profile-info{text-align:center;margin-top:-36px;padding-bottom:12px}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:var(--white);margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 4px 16px rgba(0,0,0,.12);position:relative}
.profile-avatar .edit-badge{position:absolute;bottom:0;right:-2px;width:22px;height:22px;border-radius:50%;background:var(--green);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;border:2px solid var(--white)}
.profile-name{font-size:20px;font-weight:700;margin-top:8px}
.profile-level{font-size:13px;color:var(--text-light);margin-top:2px}
/* Stats row */
.stats-row{display:flex;margin:0 16px;background:var(--bg);border-radius:var(--radius);padding:4px}
.stat-item{flex:1;text-align:center;padding:12px 4px;border-radius:var(--radius-sm);transition:background .15s}
.stat-item:active{background:var(--white)}
.stat-item .num{font-size:20px;font-weight:800;color:var(--text)}
.stat-item .label{font-size:10px;color:var(--text-light);margin-top:2px}
/* Menu items */
.menu-section{padding:16px 0}
.menu-group-label{font-size:11px;font-weight:600;color:var(--text-lighter);padding:0 20px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.menu-item{display:flex;align-items:center;gap:12px;padding:13px 20px;cursor:pointer;transition:background .12s}
.menu-item:active{background:var(--green-bg)}
.menu-item .mi-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.menu-item .mi-body{flex:1;min-width:0}
.menu-item .mi-title{font-size:14px;font-weight:500}
.menu-item .mi-desc{font-size:11px;color:var(--text-light);margin-top:1px}
.menu-item .mi-arrow{color:var(--text-lighter);font-size:16px;flex-shrink:0}
.menu-item .mi-badge{font-size:10px;background:var(--orange-bg);color:var(--orange);padding:1px 7px;border-radius:8px;font-weight:600}
.menu-divider{height:1px;background:var(--border);margin:0 20px}
body.embed{background:#e8e8e8;display:flex;align-items:center;justify-content:center;min-height:100vh}
body.embed .phone{margin:10px auto}
</style>
</head>
<body>
<script>(function(){if(location.search.indexOf('embed=1')>=0)document.body.className='embed';})();</script>
<div class="phone">
<div class="phone-notch"></div>
<div class="phone-screen">
<div class="status-bar"><span class="time">9:41</span><span class="status-icons">📶 5G 🔋 100%</span></div>
<div class="phone-content">
<div class="profile-cover"></div>
<div class="profile-info">
  <div class="profile-avatar">😊<span class="edit-badge">✎</span></div>
  <div class="profile-name">学习者</div>
  <div class="profile-level">🇪🇸 西班牙语 A2 · Level 12</div>
</div>

<div class="menu-section">
  <div class="menu-group-label">个人</div>
  <div class="menu-item"><span class="mi-icon">✎</span><div class="mi-body"><div class="mi-title">个人资料</div><div class="mi-desc">头像 · 昵称 · 简介</div></div><span class="mi-arrow">›</span></div>
  <div class="menu-divider"></div>
  <div class="menu-item"><span class="mi-icon">🌐</span><div class="mi-body"><div class="mi-title">学习语言</div><div class="mi-desc">🇪🇸 西班牙语 A2 · 🇬🇧 英语 A1</div></div><span class="mi-arrow">›</span></div>
  <div class="menu-divider"></div>
  <div class="menu-item" onclick="parent.postMessage({type:'nav',section:'personal',prototype:'settings',tab:'settings'},'*')"><span class="mi-icon">⚙️</span><div class="mi-body"><div class="mi-title">设置</div><div class="mi-desc">学习偏好 · API配置 · 通知 · 主题</div></div><span class="mi-arrow">›</span></div>
</div>

</div><!-- /phone-content -->
<div class="tab-bar">
  <button class="tab-item"><span class="tab-icon">🏠</span><span class="tab-label">学习</span></button>
  <button class="tab-item"><span class="tab-icon">🏆</span><span class="tab-label">排行</span></button>
  <button class="tab-item"><span class="tab-icon">👥</span><span class="tab-label">互动</span></button>
  <button class="tab-item active"><span class="tab-icon">👤</span><span class="tab-label">个人</span></button>
</div>
</div><!-- /phone-screen -->
</div><!-- /phone -->
</body>
</html>
