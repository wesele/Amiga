name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Linux system deps (Tauri runtime)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev
      # content-studio/data/vocabulary.json is gitignored. The release builds
      # compile a Rust lib that `include_str!`s it; seed a minimal fixture if
      # missing. The real production data is regenerated by Content Studio
      # locally and committed via Content Studio's own sync before release.
      - name: Ensure vocabulary.json exists (CI minimal fixture)
        run: |
          mkdir -p content-studio/data
          if [ ! -f content-studio/data/vocabulary.json ]; then
            cat > content-studio/data/vocabulary.json <<'JSON'
          {
            "data": {
              "English": { "A1": "the, be, to" },
              "Espanol": { "A1": "el, ser, estar" },
              "中文":   { "A1": "的, 是, 我" }
            }
          }
          JSON
            echo "Created CI fixture vocabulary.json"
          fi
      - name: Restore Android SDK + NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/Android/Sdk
            ~/.gradle
          key: android-${{ runner.os }}-${{ hashFiles('src-tauri/gen/android/app/build.gradle.kts', 'src-tauri/gen/android/build.gradle.kts') }}
      # android-actions/setup-android@v3 解析 packages 时把整段当成一个包名，
      # 所以绕过去用 sdkmanager 直接装。GitHub runner 自带 cmdline-tools
      # 在 /usr/local/lib/android/sdk/cmdline-tools/<rev>/bin/，取第一个就是。
      - name: Install Android SDK packages
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          set -e
          SDKMANAGER=$(ls -d /usr/local/lib/android/sdk/cmdline-tools/*/bin/sdkmanager | head -1)
          echo "Using sdkmanager: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.0.12077973"
      - name: Decode release keystore
        env:
          AMIGA_KEYSTORE_BASE64: ${{ secrets.AMIGA_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$AMIGA_KEYSTORE_BASE64" ]; then
            echo "::error::Secret AMIGA_KEYSTORE_BASE64 is not set."
            exit 1
          fi
          mkdir -p src-tauri
          echo "$AMIGA_KEYSTORE_BASE64" | base64 -d > src-tauri/amiga-release.keystore
          ls -l src-tauri/amiga-release.keystore
      - name: npm ci
        run: npm ci
      - name: tauri android init
        run: npx tauri android init --ci
      - name: Apply Android patches (tracked Kotlin → gen/)
        run: node scripts/android-patch.cjs
      - name: Write keystore.properties from secrets
        env:
          AMIGA_KEYSTORE_PASSWORD: ${{ secrets.AMIGA_KEYSTORE_PASSWORD }}
          AMIGA_KEY_ALIAS: ${{ secrets.AMIGA_KEY_ALIAS }}
          AMIGA_KEY_PASSWORD: ${{ secrets.AMIGA_KEY_PASSWORD }}
        run: |
          for v in AMIGA_KEYSTORE_PASSWORD AMIGA_KEY_ALIAS AMIGA_KEY_PASSWORD; do
            if [ -z "${!v}" ]; then
              echo "::error::Secret $v is not set."
              exit 1
            fi
          done
          cat > src-tauri/gen/android/app/keystore.properties <<EOF
          storeFile=../../../amiga-release.keystore
          storePassword=${AMIGA_KEYSTORE_PASSWORD}
          keyAlias=${AMIGA_KEY_ALIAS}
          keyPassword=${AMIGA_KEY_PASSWORD}
          EOF
      - name: Build APK (aarch64)
        run: npx tauri android build --target aarch64 --apk
      - name: Sign APK (post-step, apksigner)
        # Tauri's gradle signingConfig isn't picking up keystore.properties
        # in CI for unknown reasons (file is written, build reads it, but
        # the produced APK is still named *-unsigned.apk). Sign manually
        # with apksigner as a robust post-step.
        env:
          AMIGA_KEYSTORE_PASSWORD: ${{ secrets.AMIGA_KEYSTORE_PASSWORD }}
          AMIGA_KEY_ALIAS: ${{ secrets.AMIGA_KEY_ALIAS }}
          AMIGA_KEY_PASSWORD: ${{ secrets.AMIGA_KEY_PASSWORD }}
        run: |
          UNSIGNED=$(find src-tauri/gen/android/app/build/outputs/apk -name '*-unsigned.apk' | head -1)
          if [ -z "$UNSIGNED" ]; then
            echo "::error::No unsigned APK found to sign"
            exit 1
          fi
          echo "Signing: $UNSIGNED"
          SIGNED="${UNSIGNED/-unsigned.apk/.apk}"
          ZIPALIGN=$(ls -d /usr/local/lib/android/sdk/build-tools/*/zipalign | head -1)
          APKSIGNER=$(ls -d /usr/local/lib/android/sdk/build-tools/*/apksigner | head -1)
          echo "Using zipalign: $ZIPALIGN"
          echo "Using apksigner: $APKSIGNER"
          "$ZIPALIGN" -f -p 4 "$UNSIGNED" "$SIGNED"
          "$APKSIGNER" sign \
            --ks src-tauri/amiga-release.keystore \
            --ks-key-alias "$AMIGA_KEY_ALIAS" \
            --ks-pass "pass:$AMIGA_KEYSTORE_PASSWORD" \
            --key-pass "pass:$AMIGA_KEY_PASSWORD" \
            --out "$SIGNED" \
            "$SIGNED"
          "$APKSIGNER" verify --verbose "$SIGNED" | head -5
          echo "✓ Signed APK: $SIGNED"
      - name: Collect APK
        run: |
          mkdir -p dist-artifacts
          # Pick the signed APK (post-build apksigner step produces it next
          # to the unsigned one). Fall back to the unsigned if signing step
          # was skipped (shouldn't happen).
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name 'app-universal-release.apk' | head -1)
          if [ -z "$APK" ]; then
            APK=$(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' ! -name '*-unsigned.apk' | head -1)
          fi
          if [ -z "$APK" ]; then
            echo "::error::No signed APK to collect"
            exit 1
          fi
          cp "$APK" dist-artifacts/
          ls -l dist-artifacts/
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amiga-android-apk
          path: dist-artifacts/*.apk
          if-no-files-found: error

  windows:
    name: Windows (MSI/NSIS/EXE)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      # Same minimal fixture as the Android job. Use PowerShell on Windows
      # because the default `bash` on windows-latest does not support the
      # heredoc-with-newline form we use on Linux.
      - name: Ensure vocabulary.json exists (CI minimal fixture)
        shell: pwsh
        run: |
          $dir = 'content-studio/data'
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $file = Join-Path $dir 'vocabulary.json'
          if (Test-Path -LiteralPath $file) { exit 0 }
          @'
          {
            "data": {
              "English": { "A1": "the, be, to" },
              "Espanol": { "A1": "el, ser, estar" },
              "中文":   { "A1": "的, 是, 我" }
            }
          }
          '@ | Set-Content -LiteralPath $file -Encoding utf8
      - name: npm ci
        run: npm ci
      - name: Build Tauri bundle
        run: npx tauri build
      - name: Collect Windows installers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          Get-ChildItem -Path src-tauri/target/release/bundle/msi,src-tauri/target/release/bundle/nsis -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Extension -in '.msi','.exe' } |
            Copy-Item -Destination dist-artifacts/
          Get-ChildItem -Path dist-artifacts -Recurse
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amiga-windows-installer
          path: dist-artifacts/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [android, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Rename APK to versioned filename
        run: |
          version="${GITHUB_REF_NAME#v}"
          find artifacts/amiga-android-apk -maxdepth 1 -type f -name '*.apk' \
            -execdir mv {} "amiga-v${version}.apk" \;
          find artifacts -type f | sort
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/amiga-android-apk/*
            artifacts/amiga-windows-installer/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Run only on tag pushes (workflow_dispatch has no tag, so there's no
  # APK to download). Pulls the *published* APK straight from the GitHub
  # release so the deploy never depends on local build artifacts or
  # file paths the build job produced.
  deploy-pages:
    name: Deploy APK to Cloudflare Pages
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CF_PROJECT_NAME: amiga-7xz
    steps:
      - uses: actions/checkout@v4
      - name: Download APK from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p pages-dist
          gh release download "$GITHUB_REF_NAME" \
            --pattern "amiga-v*.apk" \
            --dir pages-dist
          APK=$(ls pages-dist/amiga-v*.apk | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK asset found in release $GITHUB_REF_NAME"
            exit 1
          fi
          mv "$APK" pages-dist/Amiga.apk
          ls -l pages-dist/
      - name: Stage static assets
        run: |
          cp pages/amiga-icon.png pages-dist/amiga-icon.png
          cp pages/index.html pages-dist/index.html
      - name: Inject version into HTML
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          sed -i "s|__AMIGA_VERSION__|${VERSION}|g" pages-dist/index.html
          echo "Updated version to: ${VERSION}"
          grep "class=\"version\"" pages-dist/index.html
      - name: Deploy to Cloudflare Pages (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx wrangler@latest pages deploy pages-dist \
            --project-name="$CF_PROJECT_NAME" \
            --commit-dirty=true \
            --branch=master
