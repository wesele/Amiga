<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Idioma - 练习</title>
<style>
:root{--green:#58cc02;--green-hover:#46a302;--green-bg:#eaffd6;--blue:#1cb0f6;--blue-hover:#1899d6;--blue-bg:#ddf4ff;--orange:#ff9600;--orange-hover:#e08500;--orange-bg:#fff0d6;--red:#ff4b4b;--red-bg:#ffe0e0;--purple:#7c3aed;--purple-bg:#ede9fe;--pink:#ec4899;--pink-bg:#fce7f3;--text:#2d2d2d;--text-light:#777;--text-lighter:#aaa;--bg:#f5f5f5;--white:#fff;--border:#e5e5e5;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 30px rgba(0,0,0,.15);--radius:12px;--radius-sm:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;font-size:15px;color:var(--text);background:#d4d4d4}
.phone-wrap{display:flex;justify-content:center;margin:30px 0}
.phone{width:320px;height:768px;background:var(--white);border-radius:44px;box-shadow:0 12px 40px rgba(0,0,0,.2),inset 0 0 0 1px rgba(255,255,255,.1);border:3px solid #1a1a1a;position:relative;box-sizing:content-box;overflow:hidden;flex-shrink:0}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:130px;height:28px;background:#1a1a1a;border-radius:0 0 18px 18px;z-index:10}
.phone-notch::after{content:'';position:absolute;top:6px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;border:2px solid #333;background:transparent}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg)}
.phone-screen::-webkit-scrollbar{width:0}
.phone-content{padding:8px 16px 0}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 6px;font-size:12px;font-weight:700;background:var(--white);position:sticky;top:0;z-index:9;color:#1a1a1a}
.status-bar .time{font-weight:800;font-size:13px}
.status-icons{display:flex;align-items:center;gap:4px;font-size:11px}
.screen-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-top:4px}
.back-btn{background:none;border:none;font-size:22px;cursor:pointer;font-family:inherit;padding:4px;color:var(--text);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.back-btn:hover{background:var(--bg)}
.screen-title{font-weight:700;font-size:15px;color:var(--text)}
.exercise-xp{margin-left:auto;font-size:11px;font-weight:700;color:var(--green);background:var(--green-bg);padding:4px 10px;border-radius:50px}
.exercise-progress{display:flex;gap:5px;margin-bottom:16px;justify-content:center}
.exercise-progress .dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-lighter);background:var(--white);transition:all .3s}
.exercise-progress .dot.done{border-color:var(--green);background:var(--green);color:#fff}
.exercise-progress .dot.current{border-color:var(--blue);background:var(--white);color:var(--blue);box-shadow:0 0 0 3px rgba(28,176,246,.2)}
.exercise-card{background:var(--white);border-radius:var(--radius);padding:24px 20px;margin:8px 0 12px;box-shadow:var(--shadow)}
.exercise-card.answered{border:2px solid var(--green)}
.exercise-prompt{text-align:center;margin:8px 0 20px}
.emoji-display{font-size:56px;margin-bottom:8px}
.prompt-text{font-size:17px;font-weight:700;line-height:1.5}
.prompt-text span{font-weight:400;color:var(--text-light)}
.hint{font-size:12px;color:var(--text-lighter);margin-top:6px;font-weight:400}
.exercise-options{display:grid;gap:10px}
.exercise-opt{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg);border-radius:var(--radius-sm);border:2px solid transparent;cursor:pointer;transition:all .15s;font-size:14px;font-family:inherit;text-align:left;color:var(--text);width:100%;font-weight:500}
.exercise-opt:hover{border-color:var(--blue);background:var(--blue-bg);transform:translateX(2px)}
.exercise-opt.correct{border-color:var(--green);background:var(--green-bg)}
.exercise-opt.wrong{border-color:var(--red);background:var(--red-bg)}
.exercise-opt .opt-label{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--text-light);flex-shrink:0}
.exercise-opt.correct .opt-label{background:var(--green);color:#fff;box-shadow:0 2px 6px rgba(88,204,2,.3)}
.exercise-opt.wrong .opt-label{background:var(--red);color:#fff}
.exercise-feedback{display:none;text-align:center;padding:14px;border-radius:var(--radius-sm);margin-top:16px;font-weight:700;font-size:14px}
.exercise-feedback.show{display:block}
.exercise-feedback.correct{background:var(--green-bg);color:var(--green);border:1px solid rgba(88,204,2,.2)}
.exercise-feedback.wrong{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,75,75,.2)}
.exercise-action{text-align:center;margin-top:16px}
.next-btn{background:linear-gradient(135deg,var(--green),var(--green-hover));color:#fff;border:none;padding:14px 40px;border-radius:50px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 4px 12px rgba(88,204,2,.3);width:100%}
.next-btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(88,204,2,.35)}
@media(max-width:900px){.phone{width:280px;height:672px}}
@media(max-width:600px){.phone{width:240px;height:576px;border-radius:24px}.phone-notch{width:80px;height:18px}}
body.embed{background:#e8e8e8;display:flex;align-items:center;justify-content:center;min-height:100vh}
body.embed .phone{margin:10px auto}
</style>
</head>
<body>
<script>(function(){if(location.search.indexOf('embed=1')>=0)document.body.className='embed';})();</script>
<div class="phone-wrap">
<div class="phone">
<div class="phone-notch"></div>
<div class="phone-screen">
<div class="status-bar"><span class="time">9:41</span><span class="status-icons">📶 5G 🔋 100%</span></div>
<div class="phone-content">
<div class="screen-header">
  <button class="back-btn">←</button>
  <span class="screen-title">基础问候</span>
  <span class="exercise-xp">⭐⭐ 0 XP</span>
</div>
<div class="exercise-progress">
  <div class="dot done">✓</div>
  <div class="dot done">✓</div>
  <div class="dot done">✓</div>
  <div class="dot current">4</div>
  <div class="dot">5</div>
  <div class="dot">6</div>
  <div class="dot">7</div>
  <div class="dot">8</div>
</div>
<div class="exercise-card">
  <div class="exercise-prompt">
    <div class="emoji-display">👋</div>
    <div class="prompt-text">¿Cómo se dice "朋友" en español?</div>
    <div class="hint">Selecciona la respuesta correcta</div>
  </div>
  <div class="exercise-options">
    <button class="exercise-opt correct">
      <span class="opt-label">A</span> Amigo
    </button>
    <button class="exercise-opt wrong">
      <span class="opt-label">B</span> Hermano
    </button>
    <button class="exercise-opt">
      <span class="opt-label">C</span> Maestro
    </button>
    <button class="exercise-opt">
      <span class="opt-label">D</span> Estudiante
    </button>
  </div>
  <div class="exercise-feedback show correct">✅ ¡Correcto! +10 XP · "Amigo" 就是朋友的意思</div>
  <div class="exercise-action">
    <button class="next-btn">下一题 →</button>
  </div>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
