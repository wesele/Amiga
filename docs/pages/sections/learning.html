<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 学习 - Idioma 产品交互设计文档</title>
<style>:root {
  --green: #58cc02; --green-hover: #46a302; --green-bg: #eaffd6;
  --blue: #1cb0f6; --blue-hover: #1899d6; --blue-bg: #ddf4ff;
  --orange: #ff9600; --orange-hover: #e08500; --orange-bg: #fff0d6;
  --red: #ff4b4b; --red-bg: #ffe0e0;
  --purple: #7c3aed; --purple-bg: #ede9fe;
  --pink: #ec4899; --pink-bg: #fce7f3;
  --text: #3a3a3a; --text-light: #777; --text-lighter: #aaa;
  --bg: #f7f7f7; --white: #fff; --border: #e5e5e5;
  --shadow: 0 2px 12px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.12);
  --radius: 12px; --radius-sm: 8px; --radius-lg: 20px;
  --sidebar-w: 260px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;
  font-size: 15px; color: var(--text); background: var(--bg);
  min-height: 100vh;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #999; }
.main { max-width: 960px; margin: 0 auto; padding: 40px 32px; }
.section { margin-bottom: 60px; }
.section h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
.section > .desc { color: var(--text-light); margin-bottom: 24px; line-height: 1.6; }
.card-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.card-item {
  background: var(--white); border-radius: var(--radius); padding: 24px;
  border: 1px solid var(--border); transition: all .2s;
  display: flex; flex-direction: column;
}
.card-item:hover { box-shadow: var(--shadow); border-color: var(--green); transform: translateY(-2px); }
.card-item.clickable { cursor: pointer; }
.card-item .icon { font-size: 32px; margin-bottom: 10px; }
.card-item h4 { font-size: 16px; margin-bottom: 6px; }
.card-item p { font-size: 13px; color: var(--text-light); line-height: 1.5; flex: 1; }
.tag { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.tag-green { background: var(--green-bg); color: var(--green); }
.tag-blue { background: var(--blue-bg); color: var(--blue); }
.tag-orange { background: var(--orange-bg); color: var(--orange); }
@media (max-width: 600px) {
  .main { padding: 24px 16px; }
  .card-row { grid-template-columns: 1fr; }
}
body.embed .main { padding: 24px 20px; }
</style>
</head>
<body>
<script>(function(){if(location.search.indexOf('embed=1')>=0)document.body.className='embed';})();</script>

<main class="main">
  <section class="section">
    <h2>📚 学习</h2>
    <p class="desc">学习模块是 Idioma 的核心功能区，包含课程路径、AI 口语练习和单词本三大核心功能。点击带原型的卡片可在右侧预览交互原型。</p>
    <div class="card-row">
      <div class="card-item clickable" onclick="parent.postMessage({type:'nav', prototype:'home'}, '*');">
        <div class="icon">🏠</div>
        <h4>课程路径</h4>
        <p>结构化学习路径，从入门到精通，逐步解锁课程节点，每日目标引导持续学习</p>
      </div>
      <div class="card-item clickable" onclick="parent.postMessage({type:'nav', prototype:'ai-chat'}, '*');">
        <div class="icon">🤖</div>
        <h4>AI 口语练习</h4>
        <p>与 AI 进行场景对话练习，实时纠正语法和发音，提升口语表达能力</p>
      </div>
      <div class="card-item">
        <div class="icon">📖</div>
        <h4>单词本</h4>
        <p>已学词汇分组管理，支持闪卡复习与搜索，巩固记忆效果</p>
        <span class="tag tag-green">开发中</span>
      </div>
    </div>
  </section>
</main>

</body>
</html>
