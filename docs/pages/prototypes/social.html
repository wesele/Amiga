<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Idioma - 社交</title>
<style>
:root{--green:#58cc02;--green-hover:#46a302;--green-bg:#eaffd6;--blue:#1cb0f6;--blue-hover:#1899d6;--blue-bg:#ddf4ff;--orange:#ff9600;--orange-hover:#e08500;--orange-bg:#fff0d6;--red:#ff4b4b;--red-bg:#ffe0e0;--purple:#7c3aed;--purple-bg:#ede9fe;--pink:#ec4899;--pink-bg:#fce7f3;--text:#3a3a3a;--text-light:#777;--text-lighter:#aaa;--bg:#f5f5f5;--white:#fff;--border:#e5e5e5;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 12px 48px rgba(0,0,0,.22);--radius:12px;--radius-sm:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;font-size:15px;color:var(--text);background:#f5f5f5}
.phone{width:320px;height:640px;background:var(--white);border-radius:44px;box-shadow:0 12px 48px rgba(0,0,0,.22),inset 0 0 0 1px rgba(255,255,255,.1);border:3px solid #1a1a1a;position:relative;box-sizing:content-box;overflow:hidden;flex-shrink:0}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:30px;background:#1a1a1a;border-radius:0 0 20px 20px;z-index:20}
.phone-notch::after{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;border:2px solid #333;background:transparent}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg)}
.phone-screen::-webkit-scrollbar{width:0}
.phone-content{padding:38px 16px 0}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 24px 4px;font-size:12px;font-weight:700;background:var(--white);position:absolute;top:0;left:0;right:0;z-index:15;color:#1a1a1a;height:36px}
.status-bar .time{font-weight:800;font-size:13px}
.status-icons{display:flex;align-items:center;gap:4px;font-size:11px}
.tab-bar{display:flex;background:var(--white);border-top:1px solid var(--border);position:sticky;bottom:0;z-index:9;padding:4px 0;justify-content:space-around}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 8px;cursor:pointer;border:none;background:none;font-size:10px;color:var(--text-lighter);transition:all .2s;font-family:inherit}
.tab-item .tab-icon{font-size:20px;line-height:1}
.tab-item .tab-label{font-size:10px;font-weight:500}
.tab-item.active{color:var(--green);position:relative}
.tab-item.active::after{content:'';position:absolute;top:-1px;width:20px;height:3px;background:var(--green);border-radius:0 0 3px 3px}
.page-title{font-size:18px;font-weight:700;margin-bottom:14px;padding-top:2px;color:var(--text)}
.bilingual-card{background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(124,58,237,.25)}
.bilingual-card:hover{transform:scale(1.02);box-shadow:0 6px 24px rgba(124,58,237,.35)}
.bilingual-card .card-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bilingual-card .card-icon{font-size:22px}
.bilingual-card .card-title{font-weight:700;font-size:16px;color:#fff}
.bilingual-card .card-desc{font-size:12px;color:rgba(255,255,255,.8);margin-bottom:12px;line-height:1.5}
.bilingual-card .lang-tags{display:flex;align-items:center;gap:10px}
.bilingual-card .lang-tag{padding:5px 12px;border-radius:50px;background:rgba(255,255,255,.2);color:#fff;font-size:11px;font-weight:500}
.bilingual-card .chat-separator{color:rgba(255,255,255,.6);font-size:15px}
.tag{display:inline-block;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:600}
.tag-white{background:rgba(255,255,255,.2);color:#fff}
.tag-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(88,204,2,.15)}
.tag-blue{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(28,176,246,.15)}
.social-card{background:var(--white);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:box-shadow .2s}
.social-card:hover{box-shadow:var(--shadow)}
.friend-section-title{font-size:14px;font-weight:700;margin:16px 0 8px;color:var(--text)}
.friend-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--white);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.friend-item:hover{transform:translateX(4px);box-shadow:var(--shadow)}
.friend-avatar{width:40px;height:40px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.friend-info{flex:1}
.friend-name{font-size:14px;font-weight:600}
.friend-status{font-size:11px;color:var(--text-light);margin-top:2px}
body.embed{background:#e8e8e8;display:flex;align-items:center;justify-content:center;min-height:100vh}
body.embed .phone{margin:10px auto}
</style>
</head>
<body>
<script>(function(){if(location.search.indexOf('embed=1')>=0)document.body.className='embed';})();</script>
<div class="phone">
<div class="phone-notch"></div>
<div class="phone-screen">
<div class="status-bar"><span class="time">9:41</span><span class="status-icons">📶 5G 🔋 100%</span></div>
<div class="phone-content">
<div class="page-title">👥 社交</div>
<div class="bilingual-card">
  <div class="card-header">
    <span class="card-icon">💬</span>
    <span class="card-title">双语聊天</span>
    <span class="tag tag-white" style="margin-left:auto">✨ 新功能</span>
  </div>
  <p class="card-desc">与语言伙伴实时双语聊天，AI 自动翻译，边聊边学</p>
  <div class="lang-tags">
    <span class="lang-tag">🇨🇳 你说中文</span>
    <span class="chat-separator">↔</span>
    <span class="lang-tag">🇪🇸 TA说西语</span>
  </div>
</div>
<div class="social-card">
  <div style="font-weight:700;font-size:15px;margin-bottom:8px">🤝 互助学习</div>
  <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">
    <span class="tag tag-green" style="font-size:12px">🇨🇳 中文</span>
    <span style="color:var(--text-lighter);font-weight:300">→</span>
    <span class="tag tag-blue" style="font-size:12px">🇪🇸 西语</span>
  </div>
  <p style="font-size:12px;color:var(--text-light);line-height:1.5">找到语言伙伴，互相纠正练习，一起进步！</p>
</div>
<div class="friend-section-title">好友列表</div>
<div class="friend-item">
  <div class="friend-avatar" style="background:#fce7f3">👩</div>
  <div class="friend-info">
    <div class="friend-name">Maria</div>
    <div class="friend-status">💬 聊天中</div>
  </div>
</div>
<div class="friend-item">
  <div class="friend-avatar" style="background:#eaffd6">👨</div>
  <div class="friend-info">
    <div class="friend-name">Carlos</div>
    <div class="friend-status">🔥 8 天连胜</div>
  </div>
</div>
<div class="friend-item">
  <div class="friend-avatar" style="background:#ddf4ff">🧑</div>
  <div class="friend-info">
    <div class="friend-name">Yuki</div>
    <div class="friend-status">🔥 3 天连胜</div>
  </div>
</div>
</div>
<div class="tab-bar">
  <button class="tab-item"><span class="tab-icon">🏠</span><span class="tab-label">学习</span></button>
  <button class="tab-item"><span class="tab-icon">🏆</span><span class="tab-label">排行</span></button>
  <button class="tab-item active"><span class="tab-icon">👥</span><span class="tab-label">互动</span></button>
  <button class="tab-item"><span class="tab-icon">👤</span><span class="tab-label">个人</span></button>
</div>
</div>
</div>
</body>
</html>
