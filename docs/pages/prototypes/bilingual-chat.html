<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Idioma - 双语聊天</title>
<style>
:root{--green:#58cc02;--green-hover:#46a302;--green-bg:#eaffd6;--blue:#1cb0f6;--blue-hover:#1899d6;--blue-bg:#ddf4ff;--orange:#ff9600;--orange-hover:#e08500;--orange-bg:#fff0d6;--red:#ff4b4b;--red-bg:#ffe0e0;--purple:#7c3aed;--purple-bg:#ede9fe;--pink:#ec4899;--pink-bg:#fce7f3;--text:#3a3a3a;--text-light:#777;--text-lighter:#aaa;--bg:#f5f5f5;--white:#fff;--border:#e5e5e5;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 12px 48px rgba(0,0,0,.22);--radius:12px;--radius-sm:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;font-size:15px;color:var(--text);background:#f5f5f5}
.phone{width:320px;height:640px;background:var(--white);border-radius:44px;box-shadow:0 12px 48px rgba(0,0,0,.22),inset 0 0 0 1px rgba(255,255,255,.1);border:3px solid #1a1a1a;position:relative;box-sizing:content-box;overflow:hidden;flex-shrink:0}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:30px;background:#1a1a1a;border-radius:0 0 20px 20px;z-index:20}
.phone-notch::after{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;border:2px solid #333;background:transparent}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg)}
.phone-screen::-webkit-scrollbar{width:0}
.phone-content{padding:38px 16px 0;display:flex;flex-direction:column;min-height:calc(100% - 0px)}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 24px 4px;font-size:12px;font-weight:700;background:var(--white);position:absolute;top:0;left:0;right:0;z-index:15;color:#1a1a1a;height:36px}
.status-bar .time{font-weight:800;font-size:13px}
.status-icons{display:flex;align-items:center;gap:4px;font-size:11px}
.tab-bar{display:flex;background:var(--white);border-top:1px solid var(--border);position:sticky;bottom:0;z-index:9;padding:4px 0;justify-content:space-around;margin-top:auto}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 8px;cursor:pointer;border:none;background:none;font-size:10px;color:var(--text-lighter);transition:all .2s;font-family:inherit}
.tab-item .tab-icon{font-size:20px;line-height:1}
.tab-item .tab-label{font-size:10px;font-weight:500}
.tab-item.active{color:var(--green);position:relative}
.tab-item.active::after{content:'';position:absolute;top:-1px;width:20px;height:3px;background:var(--green);border-radius:0 0 3px 3px}
.screen-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-top:2px}
.back-btn{background:none;border:none;font-size:22px;cursor:pointer;font-family:inherit;padding:4px;color:var(--text);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.back-btn:hover{background:var(--border)}
.screen-subtitle{font-size:10px;color:var(--text-lighter)}
.tag{display:inline-block;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:600}
.tag-purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(124,58,237,.15)}
.chat-avatar-header{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple-bg),#fce7f3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 2px 6px rgba(124,58,237,.15)}
.chat-name{font-weight:700;font-size:14px}
.chat-container{flex:1;display:flex;flex-direction:column;gap:12px;padding:8px 0;overflow-y:auto;min-height:0}
.chat-msg{display:flex;gap:8px;align-items:flex-start}
.chat-msg.self{flex-direction:row-reverse}
.chat-msg .avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:4px}
.chat-msg .avatar-purple{background:var(--purple-bg)}
.chat-msg .avatar-green{background:var(--green-bg)}
.chat-bubble{max-width:85%}
.chat-bubble .text{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5}
.chat-bubble .text.incoming{background:var(--white);border:1px solid var(--border);border-radius:0 12px 12px 12px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.chat-bubble .text.outgoing{background:linear-gradient(135deg,var(--green),var(--green-hover));color:#fff;border-radius:12px 0 12px 12px;box-shadow:0 2px 6px rgba(88,204,2,.15)}
.chat-translation{padding:6px 12px;border-radius:10px;font-size:11px;margin-top:4px;display:inline-block;line-height:1.4}
.chat-translation.purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(124,58,237,.1)}
.chat-translation.green{background:var(--green-bg);color:var(--green-hover);border:1px solid rgba(88,204,2,.1)}
.vocab-word{background:var(--orange-bg);padding:2px 8px;border-radius:6px;font-size:12px;cursor:pointer;position:relative;display:inline-block;transition:all .15s;border-bottom:2px solid var(--orange)}
.vocab-word:hover{background:var(--orange);color:#fff;transform:scale(1.05)}
.chat-input-area{display:flex;gap:8px;padding:10px 0;border-top:1px solid var(--border);margin-top:4px}
.chat-input{flex:1;padding:11px 16px;border-radius:50px;border:2px solid var(--border);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.chat-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.chat-send-btn{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;border-radius:50%;width:42px;height:42px;font-size:18px;cursor:pointer;font-family:inherit;transition:all .15s;box-shadow:0 2px 8px rgba(124,58,237,.25);display:flex;align-items:center;justify-content:center}
.chat-send-btn:hover{transform:scale(1.08);box-shadow:0 4px 14px rgba(124,58,237,.35)}
.chat-footer{display:flex;gap:6px;margin-top:8px;font-size:10px;color:var(--text-lighter);justify-content:center;padding-bottom:4px}
.chat-footer .clickable{cursor:pointer;color:var(--purple);font-weight:600}
.chat-footer .clickable:hover{text-decoration:underline}
.chat-footer .dot{color:var(--border)}
body.embed{background:#e8e8e8;display:flex;align-items:center;justify-content:center;min-height:100vh}
body.embed .phone{margin:10px auto}
</style>
</head>
<body>
<script>(function(){if(location.search.indexOf('embed=1')>=0)document.body.className='embed';})();</script>
<div class="phone">
<div class="phone-notch"></div>
<div class="phone-screen">
<div class="status-bar"><span class="time">9:41</span><span class="status-icons">📶 5G 🔋 100%</span></div>
<div class="phone-content">
<div class="screen-header">
  <button class="back-btn">←</button>
  <div class="chat-avatar-header">👩</div>
  <div style="flex:1">
    <div class="chat-name">Maria</div>
    <div class="screen-subtitle">🇪🇸 西语母语 · 学习中文</div>
  </div>
  <span class="tag tag-purple">💬 双语</span>
</div>
<div class="chat-container">
  <div class="chat-msg">
    <div class="avatar avatar-purple">👩</div>
    <div class="chat-bubble">
      <div class="text incoming">¡Hola! ¿Cómo estás hoy?</div>
      <div class="chat-translation purple">🤖 你好！你今天怎么样？</div>
    </div>
  </div>
  <div class="chat-msg self">
    <div class="avatar avatar-green">🧑</div>
    <div class="chat-bubble">
      <div class="text outgoing">我很好！今天学了一些西班牙语单词。</div>
      <div class="chat-translation green">🤖 ¡Estoy muy bien! Hoy aprendí algunas palabras en español.</div>
    </div>
  </div>
  <div class="chat-msg">
    <div class="avatar avatar-purple">👩</div>
    <div class="chat-bubble">
      <div class="text incoming">¡Qué bien! ¿Qué palabras <span class="vocab-word" data-word="aprendiste">📘 aprendiste</span>?</div>
      <div class="chat-translation purple">🤖 太好了！你学了哪些单词？</div>
    </div>
  </div>
</div>
<div class="chat-input-area">
  <input type="text" class="chat-input" placeholder="输入消息（中文自动翻译西语）...">
  <button class="chat-send-btn">➤</button>
</div>
<div class="chat-footer">
  <span>🤖 AI 实时翻译</span>
  <span class="dot">·</span>
  <span class="clickable">点击译文学单词</span>
  <span class="dot">·</span>
  <span>💎 +2 XP/条</span>
</div>
</div>
<div class="tab-bar">
  <button class="tab-item"><span class="tab-icon">🏠</span><span class="tab-label">学习</span></button>
  <button class="tab-item"><span class="tab-icon">🏆</span><span class="tab-label">排行</span></button>
  <button class="tab-item active"><span class="tab-icon">👥</span><span class="tab-label">互动</span></button>
  <button class="tab-item"><span class="tab-icon">👤</span><span class="tab-label">个人</span></button>
</div>
</div>
</div>
</body>
</html>
