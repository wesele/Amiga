<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 800px;
    height: 1000px;
    background: radial-gradient(circle at 50% 30%, #1e1b4b 0%, #0f172a 60%, #020617 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #f8fafc;
    overflow: hidden;
  }
  .header {
    text-align: center;
    margin-bottom: 30px;
  }
  .badge {
    display: inline-block;
    padding: 6px 16px;
    background: rgba(99, 102, 241, 0.2);
    border: 1px solid rgba(129, 140, 248, 0.4);
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    color: #818cf8;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .title {
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .phone-container {
    position: relative;
    width: 420px;
    height: 780px;
    background: #090d16;
    border-radius: 48px;
    padding: 14px;
    box-shadow: 
      0 25px 50px -12px rgba(0, 0, 0, 0.7),
      0 0 80px rgba(99, 102, 241, 0.25),
      inset 0 0 0 2px rgba(255, 255, 255, 0.15);
  }
  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 36px;
    overflow: hidden;
    position: relative;
    background: #ffffff;
  }
  .phone-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .camera-notch {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 24px;
    background: #000;
    border-radius: 12px;
    z-index: 10;
  }
</style>
</head>

    <div class="title">每天，都有一封为你而来的信</div>
