<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Idioma - 排行榜</title>
<style>
:root{--green:#58cc02;--green-hover:#46a302;--green-bg:#eaffd6;--blue:#1cb0f6;--blue-hover:#1899d6;--blue-bg:#ddf4ff;--orange:#ff9600;--orange-hover:#e08500;--orange-bg:#fff0d6;--red:#ff4b4b;--red-bg:#ffe0e0;--purple:#7c3aed;--purple-bg:#ede9fe;--pink:#ec4899;--pink-bg:#fce7f3;--text:#3a3a3a;--text-light:#777;--text-lighter:#aaa;--bg:#f5f5f5;--white:#fff;--border:#e5e5e5;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 12px 48px rgba(0,0,0,.22);--radius:12px;--radius-sm:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;font-size:15px;color:var(--text);background:#f5f5f5}
.phone{width:320px;height:640px;background:var(--white);border-radius:44px;box-shadow:0 12px 48px rgba(0,0,0,.22),inset 0 0 0 1px rgba(255,255,255,.1);border:3px solid #1a1a1a;position:relative;overflow:hidden;flex-shrink:0}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:30px;background:#1a1a1a;border-radius:0 0 20px 20px;z-index:20}
.phone-notch::after{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;border:2px solid #333;background:transparent}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg)}
.phone-screen::-webkit-scrollbar{width:0}
.phone-content{padding:38px 16px 0}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 24px 4px;font-size:12px;font-weight:700;background:var(--white);position:absolute;top:0;left:0;right:0;z-index:15;color:#1a1a1a;height:36px}
.status-bar .time{font-weight:800;font-size:13px}
.status-icons{display:flex;align-items:center;gap:4px;font-size:11px}
.tab-bar{display:flex;background:var(--white);border-top:1px solid var(--border);position:sticky;bottom:0;z-index:9;padding:4px 0;justify-content:space-around}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 8px;cursor:pointer;border:none;background:none;font-size:10px;color:var(--text-lighter);transition:all .2s;font-family:inherit}
.tab-item .tab-icon{font-size:20px;line-height:1}
.tab-item .tab-label{font-size:10px;font-weight:500}
.tab-item.active{color:var(--green);position:relative}
.tab-item.active::after{content:'';position:absolute;top:-1px;width:20px;height:3px;background:var(--green);border-radius:0 0 3px 3px}
.lb-title{font-size:18px;font-weight:700;text-align:center;padding:12px 0 10px;color:var(--text)}
.lb-tabs{display:flex;gap:8px;margin-bottom:14px}
.lb-tab{flex:1;text-align:center;padding:10px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--border);font-family:inherit;transition:all .2s;color:var(--text-light)}
.lb-tab:hover{background:var(--green-bg);color:var(--green)}
.lb-tab.active{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(88,204,2,.25)}
.lb-list{display:flex;flex-direction:column;gap:6px}
.lb-card{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--white);border-radius:var(--radius-sm);box-shadow:0 1px 3px rgba(0,0,0,.04);transition:transform .15s}
.lb-card:hover{transform:translateX(3px)}
.lb-card.self{background:var(--green-bg);border:2px solid var(--green);box-shadow:0 2px 8px rgba(88,204,2,.12)}
.lb-rank{font-size:16px;font-weight:700;color:var(--text-light);width:28px;text-align:center}
.lb-rank.gold{color:#ffc107;text-shadow:0 1px 2px rgba(255,193,7,.3)}
.lb-rank.silver{color:#9e9e9e}
.lb-rank.bronze{color:#cd7f32}
.lb-avatar{width:36px;height:36px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.lb-name{flex:1;font-size:13px;font-weight:600}
.lb-name .loc{font-size:10px;color:var(--text-lighter);font-weight:400}
.lb-name .you-tag{font-size:10px;color:var(--green);font-weight:400}
.lb-xp{font-size:12px;color:var(--green);font-weight:700}
.lb-footer{text-align:center;font-size:11px;color:var(--text-lighter);margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
body.embed{background:#e8e8e8;display:flex;align-items:center;justify-content:center;min-height:100vh}
body.embed .phone{margin:10px auto}
</style>
</head>
<body>
<script>(function(){if(location.search.indexOf('embed=1')>=0)document.body.className='embed';})();</script>
<div class="phone">
<div class="phone-notch"></div>
<div class="phone-screen">
<div class="status-bar"><span class="time">9:41</span><span class="status-icons">📶 5G 🔋 100%</span></div>
<div class="phone-content">
<div class="lb-title">🏆 排行榜</div>
<div class="lb-tabs">
  <button class="lb-tab active">🌍 全球</button>
  <button class="lb-tab">🏙️ 城市</button>
  <button class="lb-tab">🗺️ 国家</button>
</div>
<div class="lb-list">
<div class="lb-card">
<div class="lb-rank gold">🥇</div>
<div class="lb-avatar">👨</div>
<div class="lb-name">Carlos<span class="loc"> 🇪🇸 西班牙</span></div>
<div class="lb-xp">2,450 XP</div>
</div>
<div class="lb-card">
<div class="lb-rank silver">🥈</div>
<div class="lb-avatar">👩</div>
<div class="lb-name">Maria<span class="loc"> 🇲🇽 墨西哥</span></div>
<div class="lb-xp">2,120 XP</div>
</div>
<div class="lb-card">
<div class="lb-rank bronze">🥉</div>
<div class="lb-avatar">🧑</div>
<div class="lb-name">Yuki<span class="loc"> 🇯🇵 日本</span></div>
<div class="lb-xp">1,890 XP</div>
</div>
<div class="lb-card self">
<div class="lb-rank" style="color:var(--green);font-weight:800">4</div>
<div class="lb-avatar" style="background:var(--green-bg);font-size:18px">😊</div>
<div class="lb-name">你 <span class="you-tag">(你)</span><span class="loc"> 🇨🇳 北京</span></div>
<div class="lb-xp">1,450 XP</div>
</div>
<div class="lb-card">
<div class="lb-rank">5</div>
<div class="lb-avatar">👱</div>
<div class="lb-name">Sofia<span class="loc"> 🇦🇷 阿根廷</span></div>
<div class="lb-xp">1,320 XP</div>
</div>
</div>
<div class="lb-footer">排行榜每周一重置</div>
</div>
<div class="tab-bar">
  <button class="tab-item"><span class="tab-icon">🏠</span><span class="tab-label">学习</span></button>
  <button class="tab-item active"><span class="tab-icon">🏆</span><span class="tab-label">排行</span></button>
  <button class="tab-item"><span class="tab-icon">👥</span><span class="tab-label">社交</span></button>
  <button class="tab-item"><span class="tab-icon">📖</span><span class="tab-label">单词</span></button>
  <button class="tab-item"><span class="tab-icon">👤</span><span class="tab-label">个人</span></button>
</div>
</div>
</div>
</body>
</html>
