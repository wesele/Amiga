<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即将上线</title>
<style>
:root { --green: #58cc02; --text-light: #777; --text-lighter: #aaa; --radius: 12px; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;
  font-size: 15px; color: var(--text-light);
  display: flex; align-items: center; justify-content: center; min-height: 100vh;
  background: #fafafa;
}
.card { text-align: center; padding: 40px; }
.card .icon { font-size: 56px; margin-bottom: 12px; }
.card h2 { font-size: 20px; font-weight: 600; color: #333; margin-bottom: 8px; }
.card p { font-size: 13px; line-height: 1.6; color: var(--text-lighter); }
.card .tag {
  display: inline-block; margin-top: 16px; padding: 4px 16px;
  background: #eaffd6; color: var(--green); border-radius: 20px;
  font-size: 12px; font-weight: 600;
}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🚧</div>
  <h2>功能开发中</h2>
  <p>该功能模块正在设计中，敬请期待</p>
  <div class="tag">Coming Soon</div>
</div>
</body>
</html>
