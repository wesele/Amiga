<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Idioma - AI 口语练习</title>
<style>
:root{--green:#58cc02;--green-hover:#46a302;--green-bg:#eaffd6;--blue:#1cb0f6;--blue-hover:#1899d6;--blue-bg:#ddf4ff;--orange:#ff9600;--orange-hover:#e08500;--orange-bg:#fff0d6;--red:#ff4b4b;--red-bg:#ffe0e0;--purple:#7c3aed;--purple-bg:#ede9fe;--pink:#ec4899;--pink-bg:#fce7f3;--text:#3a3a3a;--text-light:#777;--text-lighter:#aaa;--bg:#f7f7f7;--white:#fff;--border:#e5e5e5;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 30px rgba(0,0,0,.12);--radius:12px;--radius-sm:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;font-size:15px;color:var(--text);background:#e8e8e8}
.phone-wrap{display:flex;justify-content:center;margin:30px 0}
.phone{width:320px;height:640px;background:var(--white);border-radius:40px;box-shadow:var(--shadow-lg);border:2px solid #ddd;position:relative;overflow:hidden;flex-shrink:0}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:24px;background:#222;border-radius:0 0 16px 16px;z-index:10}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg)}
.phone-screen::-webkit-scrollbar{width:0}
.phone-content{padding:8px 16px 60px}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 20px 6px;font-size:11px;font-weight:600;background:var(--white);position:sticky;top:0;z-index:5}
.status-bar .time{font-weight:700}
.screen-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.back-btn{background:none;border:none;font-size:20px;cursor:pointer;font-family:inherit;padding:0}
.screen-title{font-weight:600;font-size:14px}
.tag{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tag-purple{background:var(--purple-bg);color:var(--purple)}
.ai-avatar-circle{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ai-chat-container{background:var(--white);border-radius:var(--radius);padding:16px;border:1px solid var(--border);min-height:300px;display:flex;flex-direction:column;gap:12px}
.ai-msg{display:flex;gap:8px;align-items:flex-start}
.ai-msg.user{flex-direction:row-reverse;margin-left:auto}
.ai-msg .ai-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ai-msg .ai-avatar.bot{background:var(--purple-bg)}
.ai-msg .ai-avatar.user{background:var(--green-bg)}
.ai-msg .ai-bubble{max-width:80%;padding:10px 14px;font-size:13px;line-height:1.4;border-radius:var(--radius)}
.ai-msg .ai-bubble.bot{background:var(--bg);border-radius:0 12px 12px 12px}
.ai-msg .ai-bubble.user{background:var(--green);color:#fff;border-radius:12px 0 12px 12px}
.ai-feedback{margin-top:6px;font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px}
.ai-input-area{display:flex;gap:8px;margin-top:12px;padding:12px 16px;border-top:1px solid var(--border);background:var(--white);border-radius:var(--radius)}
.chat-input{flex:1;padding:10px 14px;border-radius:50px;border:2px solid var(--border);font-size:13px;font-family:inherit;outline:none}
.chat-input:focus{border-color:var(--purple)}
.ai-send-btn{background:var(--purple);color:#fff;border:none;padding:10px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.ai-send-btn:hover{background:#6d28d9}
@media(max-width:900px){.phone{width:280px;height:560px}}
@media(max-width:600px){.phone{width:240px;height:480px;border-radius:24px}.phone-notch{width:80px;height:18px}}
body.embed { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
body.embed .phone { margin: 10px auto; }
</style>
</head>
<body>
<script>(function(){if(location.search.indexOf('embed=1')>=0)document.body.className='embed';})();</script>
<div class="phone-wrap">
<div class="phone">
<div class="phone-notch"></div>
<div class="phone-screen">
<div class="status-bar"><span class="time">9:41</span><span>📶 🔋 100%</span></div>
<div class="phone-content">
<div class="screen-header">
  <button class="back-btn">←</button>
  <div class="ai-avatar-circle">🤖</div>
  <span class="screen-title">AI 口语练习</span>
  <span class="tag tag-purple" style="margin-left:auto;">餐厅场景</span>
</div>
<div class="ai-chat-container">
  <div class="ai-msg">
    <div class="ai-avatar bot">🤖</div>
    <div class="ai-bubble bot">¡Hola! ¿Qué te gustaría pedir hoy?</div>
  </div>
  <div class="ai-msg user">
    <div class="ai-avatar user">🧑</div>
    <div class="ai-bubble user">Hola, quiero un café por favor.</div>
  </div>
  <div class="ai-msg">
    <div class="ai-avatar bot">🤖</div>
    <div class="ai-bubble bot">
      ¡Muy bien! ¿Algo más?
      <div class="ai-feedback"><span>✅</span> 语法正确，发音良好</div>
    </div>
  </div>
</div>
<div class="ai-input-area">
  <input type="text" class="chat-input" placeholder="输入你的回答...">
  <button class="ai-send-btn">发送</button>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
