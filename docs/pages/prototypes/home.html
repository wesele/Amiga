<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>阿米加 - 学习</title>
<style>
:root{--green:#58cc02;--green-hover:#46a302;--green-bg:#eaffd6;--blue:#1cb0f6;--blue-bg:#ddf4ff;--orange:#ff9600;--orange-bg:#fff0d6;--purple:#7c3aed;--purple-bg:#ede9fe;--pink:#ec4899;--pink-bg:#fce7f3;--text:#2d2d2d;--text-light:#777;--text-lighter:#aaa;--bg:#f5f5f5;--white:#fff;--border:#e5e5e5;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 12px 48px rgba(0,0,0,.22);--radius:12px;--radius-sm:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;font-size:15px;color:var(--text);background:#f5f5f5}
.phone{width:320px;height:768px;background:var(--white);border-radius:44px;box-shadow:0 12px 48px rgba(0,0,0,.22),inset 0 0 0 1px rgba(255,255,255,.1);border:3px solid #1a1a1a;position:relative;box-sizing:content-box;overflow:hidden;flex-shrink:0}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:30px;background:#1a1a1a;border-radius:0 0 20px 20px;z-index:20}
.phone-notch::after{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;border:2px solid #333;background:transparent}
.phone-screen{width:100%;height:100%;display:flex;flex-direction:column;background:var(--white)}
.phone-content{padding:38px 16px 0;flex:1;overflow-y:auto;min-height:0}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 24px 4px;font-size:12px;font-weight:700;background:var(--white);position:absolute;top:0;left:0;right:0;z-index:15;color:#1a1a1a;height:36px}
.status-bar .time{font-weight:800;font-size:13px}
.status-icons{display:flex;align-items:center;gap:4px;font-size:11px}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 0 16px}
.top-bar .streak{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:700;color:var(--orange);background:var(--orange-bg);padding:4px 12px 4px 8px;border-radius:50px}
.top-bar .gems{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:700;color:var(--blue);background:var(--blue-bg);padding:4px 12px 4px 8px;border-radius:50px}
.top-bar .logo{font-size:20px;font-weight:800;color:var(--green);letter-spacing:-.5px}
.greeting{font-size:22px;font-weight:800;margin-bottom:4px}
.greeting-sub{font-size:13px;color:var(--text-light);margin-bottom:20px}
/* Feature cards */
.feature-card{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:var(--radius);margin-bottom:12px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.feature-card:active{transform:scale(.98)}
.feature-card .f-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.08);position:relative}
.feature-card .f-icon .ring{position:absolute;top:-2px;right:-2px;font-size:14px}
.feature-card .f-body{flex:1;min-width:0}
.feature-card .f-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:6px}
.feature-card .f-desc{font-size:12px;color:var(--text-light);margin-top:2px;line-height:1.4}
.feature-card .f-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.feature-card .f-tag{font-size:10px;padding:2px 8px;border-radius:50px;font-weight:600}
.feature-card .f-arrow{font-size:18px;color:var(--text-lighter);flex-shrink:0;transition:transform .15s}
.feature-card:hover .f-arrow{transform:translateX(3px)}
/* News card */
.feature-card.news{background:linear-gradient(135deg,#fff3e0,#fff8e1);border:1px solid rgba(255,150,0,.2)}
.feature-card.news .f-icon{background:linear-gradient(135deg,var(--orange),#e08500);color:#fff}
.feature-card.news .f-tag{background:var(--orange-bg);color:var(--orange)}
/* Disabled card */
.feature-card.disabled{opacity:.45;pointer-events:none}
.feature-card.disabled::after{content:'暂不开发';position:absolute;top:8px;right:12px;font-size:10px;background:var(--bg);color:var(--text-lighter);padding:2px 8px;border-radius:8px;font-weight:600}
/* Vocab card */
.feature-card.vocab{background:linear-gradient(135deg,#e3f2fd,#e8eaf6);border:1px solid rgba(28,176,246,.2)}
.feature-card.vocab .f-icon{background:linear-gradient(135deg,var(--blue),#0d8bcf);color:#fff}
.feature-card.vocab .f-tag{background:var(--blue-bg);color:var(--blue)}
/* AI card */
.feature-card.ai{background:linear-gradient(135deg,#f3e5f5,#fce4ec);border:1px solid rgba(124,58,237,.2)}
.feature-card.ai .f-icon{background:linear-gradient(135deg,var(--purple),#9333ea);color:#fff}
.feature-card.ai .f-tag{background:var(--purple-bg);color:var(--purple)}
/* Daily goal mini card */
.daily-card{display:flex;align-items:center;gap:12px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px}
.daily-card .dc-icon{font-size:22px;flex-shrink:0}
.daily-card .dc-body{flex:1}
.daily-card .dc-title{font-size:13px;font-weight:600}
.daily-card .dc-bar{height:6px;background:var(--border);border-radius:3px;margin-top:6px;overflow:hidden}
.daily-card .dc-bar .fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--blue));width:60%}
.daily-card .dc-num{font-size:13px;font-weight:700;color:var(--green);flex-shrink:0}
.tab-bar{display:flex;background:var(--white);border-top:1px solid var(--border);flex-shrink:0;padding:4px 0;justify-content:space-around}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 8px;cursor:pointer;border:none;background:none;font-size:10px;color:var(--text-lighter);transition:all .2s;font-family:inherit}
.tab-item .tab-icon{font-size:20px;line-height:1}
.tab-item .tab-label{font-size:10px;font-weight:500}
.tab-item.active{color:var(--green);position:relative}
.tab-item.active::after{content:'';position:absolute;top:-1px;width:20px;height:3px;background:var(--green);border-radius:0 0 3px 3px}
body.embed{background:#e8e8e8;display:flex;align-items:center;justify-content:center;min-height:100vh}
body.embed .phone{margin:10px auto}
</style>
</head>
<body>
<script>(function(){if(location.search.indexOf('embed=1')>=0)document.body.className='embed';})();</script>
<div class="phone">
<div class="phone-notch"></div>
<div class="phone-screen">
<div class="status-bar"><span class="time">9:41</span><span class="status-icons">📶 5G 🔋 100%</span></div>
<div class="phone-content">
<div class="top-bar">
  <div class="streak">🔥 7</div>
  <div class="logo">阿米加</div>
  <div class="gems">💎 128</div>
</div>

<div class="greeting">早上好 👋</div>
<div class="greeting-sub">继续你的西班牙语学习之旅</div>

<!-- Daily goal -->
<div class="daily-card">
  <div class="dc-icon">🎯</div>
  <div class="dc-body">
    <div class="dc-title">今日目标</div>
    <div class="dc-bar"><div class="fill"></div></div>
  </div>
  <div class="dc-num">12/20 XP</div>
</div>

<!-- Feature: 新闻阅读 -->
<div class="feature-card news">
  <div class="f-icon">📰</div>
  <div class="f-body">
    <div class="f-title">新闻阅读 <span class="f-tag">今日 3 篇</span></div>
    <div class="f-desc">热搜新闻 AI 改写，滑动选中即翻译，自然积累词汇</div>
    <div class="f-meta">
      <span style="font-size:11px;color:var(--text-light)">已读 2 篇 · 新增 8 词</span>
    </div>
  </div>
  <div class="f-arrow">→</div>
</div>

<!-- Feature: 晋级之路 (disabled) -->
<div class="feature-card path disabled">
  <div class="f-icon">🏆</div>
  <div class="f-body">
    <div class="f-title">晋级之路</div>
    <div class="f-desc">完成课程、积累 XP、解锁新级别</div>
  </div>
  <div class="f-arrow">→</div>
</div>

<!-- Feature: 单词本 (disabled) -->
<div class="feature-card vocab disabled">
  <div class="f-icon">📖</div>
  <div class="f-body">
    <div class="f-title">单词本</div>
    <div class="f-desc">管理你的词汇库，复习、标记、按分组学习</div>
  </div>
  <div class="f-arrow">→</div>
</div>

<!-- Feature: AI 口语练习 (disabled) -->
<div class="feature-card ai disabled">
  <div class="f-icon">🤖</div>
  <div class="f-body">
    <div class="f-title">AI 口语练习</div>
    <div class="f-desc">与 AI 自由对话、情景模拟、发音评测、实时反馈</div>
  </div>
  <div class="f-arrow">→</div>
</div>

</div><!-- /phone-content -->
<div class="tab-bar">
  <button class="tab-item active"><span class="tab-icon">🏠</span><span class="tab-label">学习</span></button>
  <button class="tab-item"><span class="tab-icon">🏆</span><span class="tab-label">排行</span></button>
  <button class="tab-item"><span class="tab-icon">👥</span><span class="tab-label">互动</span></button>
  <button class="tab-item"><span class="tab-icon">👤</span><span class="tab-label">个人</span></button>
</div>
</div><!-- /phone-screen -->
</div><!-- /phone -->
</body>
</html>
