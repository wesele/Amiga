<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>阿米加 - 排行</title>
<style>
:root{--green:#58cc02;--green-hover:#46a302;--green-bg:#eaffd6;--blue:#1cb0f6;--blue-bg:#ddf4ff;--orange:#ff9600;--orange-bg:#fff0d6;--purple:#7c3aed;--purple-bg:#ede9fe;--pink:#ec4899;--pink-bg:#fce7f3;--gold:#ffc800;--gold-bg:#fff8d6;--text:#2d2d2d;--text-light:#777;--text-lighter:#aaa;--bg:#f5f5f5;--white:#fff;--border:#e5e5e5;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 12px 48px rgba(0,0,0,.22);--radius:12px;--radius-sm:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;font-size:15px;color:var(--text);background:#f5f5f5}
.phone{width:320px;height:768px;background:var(--white);border-radius:44px;box-shadow:0 12px 48px rgba(0,0,0,.22),inset 0 0 0 1px rgba(255,255,255,.1);border:3px solid #1a1a1a;position:relative;box-sizing:content-box;overflow:hidden;flex-shrink:0}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:30px;background:#1a1a1a;border-radius:0 0 20px 20px;z-index:20}
.phone-notch::after{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;border:2px solid #333;background:transparent}
.phone-screen{width:100%;height:100%;display:flex;flex-direction:column;background:var(--white)}
.phone-content{padding:38px 16px 0;flex:1;overflow-y:auto;min-height:0}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 24px 4px;font-size:12px;font-weight:700;background:var(--white);position:absolute;top:0;left:0;right:0;z-index:15;color:#1a1a1a;height:36px}
.status-bar .time{font-weight:800;font-size:13px}
.status-icons{display:flex;align-items:center;gap:4px;font-size:11px}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 0 16px}
.top-bar .streak{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:700;color:var(--orange);background:var(--orange-bg);padding:4px 12px 4px 8px;border-radius:50px}
.top-bar .gems{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:700;color:var(--blue);background:var(--blue-bg);padding:4px 12px 4px 8px;border-radius:50px}
.top-bar .logo{font-size:20px;font-weight:800;color:var(--green);letter-spacing:-.5px}
.greeting{font-size:22px;font-weight:800;margin-bottom:4px}
.greeting-sub{font-size:13px;color:var(--text-light);margin-bottom:20px}
/* User rank summary */
.rank-summary{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#fff8e1,#fff3e0);border:1px solid rgba(255,150,0,.2);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.rank-summary .rs-rank{text-align:center;flex-shrink:0}
.rank-summary .rs-rank .num{font-size:32px;font-weight:800;color:var(--orange);line-height:1}
.rank-summary .rs-rank .label{font-size:10px;color:var(--text-light);margin-top:2px}
.rank-summary .rs-body{flex:1;min-width:0}
.rank-summary .rs-title{font-size:14px;font-weight:700}
.rank-summary .rs-detail{font-size:12px;color:var(--text-light);margin-top:2px;line-height:1.4}
.rank-summary .rs-badge{font-size:10px;background:var(--orange);color:#fff;padding:2px 8px;border-radius:50px;font-weight:600;flex-shrink:0}
/* Feature cards */
.feature-card{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:var(--radius);margin-bottom:12px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.feature-card:active{transform:scale(.98)}
.feature-card .f-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.feature-card .f-body{flex:1;min-width:0}
.feature-card .f-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:6px}
.feature-card .f-desc{font-size:12px;color:var(--text-light);margin-top:2px;line-height:1.4}
.feature-card .f-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.feature-card .f-tag{font-size:10px;padding:2px 8px;border-radius:50px;font-weight:600}
.feature-card .f-arrow{font-size:18px;color:var(--text-lighter);flex-shrink:0;transition:transform .15s}
.feature-card:hover .f-arrow{transform:translateX(3px)}
/* Leaderboard card */
.feature-card.leaderboard{background:linear-gradient(135deg,#fff8e1,#fffde7);border:1px solid rgba(255,200,0,.25)}
.feature-card.leaderboard .f-icon{background:linear-gradient(135deg,var(--gold),#ffb300);color:#fff}
.feature-card.leaderboard .f-tag{background:var(--gold-bg);color:#b8860b}
/* World map card */
.feature-card.world{background:linear-gradient(135deg,#e8f5e9,#e0f2f1);border:1px solid rgba(0,150,136,.2)}
.feature-card.world .f-icon{background:linear-gradient(135deg,#009688,#26a69a);color:#fff}
.feature-card.world .f-tag{background:#e0f2f1;color:#00796b}
/* Mini preview within cards */
.preview-row{display:flex;gap:10px;margin-top:8px}
.preview-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-light)}
.preview-item .p-rank{font-weight:700;width:16px;text-align:center}
.preview-item .p-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;background:var(--bg)}
.preview-item .p-name{font-size:10px}
.preview-item .p-xp{font-size:9px;color:var(--orange);font-weight:600}
.tab-bar{display:flex;background:var(--white);border-top:1px solid var(--border);flex-shrink:0;padding:4px 0;justify-content:space-around}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 8px;cursor:pointer;border:none;background:none;font-size:10px;color:var(--text-lighter);transition:all .2s;font-family:inherit}
.tab-item .tab-icon{font-size:20px;line-height:1}
.tab-item .tab-label{font-size:10px;font-weight:500}
.tab-item.active{color:var(--green);position:relative}
.tab-item.active::after{content:'';position:absolute;top:-1px;width:20px;height:3px;background:var(--green);border-radius:0 0 3px 3px}
body.embed{background:#e8e8e8;display:flex;align-items:center;justify-content:center;min-height:100vh}
body.embed .phone{margin:10px auto}
</style>
</head>
<body>
<script>(function(){if(location.search.indexOf('embed=1')>=0)document.body.className='embed';})();</script>
<div class="phone">
<div class="phone-notch"></div>
<div class="phone-screen">
<div class="status-bar"><span class="time">9:41</span><span class="status-icons">📶 5G 🔋 100%</span></div>
<div class="phone-content">
<div class="top-bar">
  <div class="streak">🔥 7</div>
  <div class="logo">阿米加</div>
  <div class="gems">💎 128</div>
</div>

<div class="greeting">🏆 排行</div>
<div class="greeting-sub">看看你和全球学习者的差距</div>

<!-- User rank summary -->
<div class="rank-summary">
  <div class="rs-rank">
    <div class="num">#4</div>
    <div class="label">排名</div>
  </div>
  <div class="rs-body">
    <div class="rs-title">你在北京排名第 2</div>
    <div class="rs-detail">本周 1,450 XP · 距第 3 名还差 230 XP</div>
  </div>
  <div class="rs-badge">+2 ↑</div>
</div>

<!-- Feature: 排行榜 -->
<div class="feature-card leaderboard">
  <div class="f-icon">🏆</div>
  <div class="f-body">
    <div class="f-title">排行榜 <span class="f-tag">全球 · 城市 · 国家</span></div>
    <div class="f-desc">按 XP 排名，与全球学习者同台竞技</div>
    <div class="preview-row">
      <div class="preview-item"><span class="p-rank">1</span><span class="p-avatar">👨</span><span class="p-name">Carlos</span><span class="p-xp">2,450</span></div>
      <div class="preview-item"><span class="p-rank">2</span><span class="p-avatar">👩</span><span class="p-name">Maria</span><span class="p-xp">2,120</span></div>
      <div class="preview-item"><span class="p-rank">3</span><span class="p-avatar">🧑</span><span class="p-name">Yuki</span><span class="p-xp">1,890</span></div>
    </div>
  </div>
  <div class="f-arrow">→</div>
</div>

<!-- Feature: 世界地理 -->
<div class="feature-card world">
  <div class="f-icon">🗺️</div>
  <div class="f-body">
    <div class="f-title">世界地理 <span class="f-tag">🌐 36 国</span></div>
    <div class="f-desc">查看全球学习者分布，发现身边的学友</div>
    <div class="f-meta">
      <span style="font-size:11px;color:var(--text-light)">🇨🇳 中国 2,340 人 · 🇪🇸 西班牙 891 人 · 🇲🇽 墨西哥 654 人</span>
    </div>
  </div>
  <div class="f-arrow">→</div>
</div>

</div><!-- /phone-content -->
<div class="tab-bar">
  <button class="tab-item"><span class="tab-icon">🏠</span><span class="tab-label">学习</span></button>
  <button class="tab-item active"><span class="tab-icon">🏆</span><span class="tab-label">排行</span></button>
  <button class="tab-item"><span class="tab-icon">👥</span><span class="tab-label">互动</span></button>
  <button class="tab-item"><span class="tab-icon">👤</span><span class="tab-label">个人</span></button>
</div>
</div><!-- /phone-screen -->
</div><!-- /phone -->
</body>
</html>
