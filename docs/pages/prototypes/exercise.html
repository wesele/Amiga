<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Idioma - 练习</title>
<style>
:root{--green:#58cc02;--green-hover:#46a302;--green-bg:#eaffd6;--blue:#1cb0f6;--blue-hover:#1899d6;--blue-bg:#ddf4ff;--orange:#ff9600;--orange-hover:#e08500;--orange-bg:#fff0d6;--red:#ff4b4b;--red-bg:#ffe0e0;--purple:#7c3aed;--purple-bg:#ede9fe;--pink:#ec4899;--pink-bg:#fce7f3;--text:#3a3a3a;--text-light:#777;--text-lighter:#aaa;--bg:#f7f7f7;--white:#fff;--border:#e5e5e5;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 30px rgba(0,0,0,.12);--radius:12px;--radius-sm:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;font-size:15px;color:var(--text);background:#e8e8e8}
.phone-wrap{display:flex;justify-content:center;margin:30px 0}
.phone{width:320px;height:640px;background:var(--white);border-radius:40px;box-shadow:var(--shadow-lg);border:2px solid #ddd;position:relative;overflow:hidden;flex-shrink:0}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:24px;background:#222;border-radius:0 0 16px 16px;z-index:10}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg)}
.phone-screen::-webkit-scrollbar{width:0}
.phone-content{padding:8px 16px 60px}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 20px 6px;font-size:11px;font-weight:600;background:var(--white);position:sticky;top:0;z-index:5}
.status-bar .time{font-weight:700}
.screen-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.back-btn{background:none;border:none;font-size:20px;cursor:pointer;font-family:inherit;padding:0}
.screen-title{font-weight:600;font-size:14px}
.exercise-xp{margin-left:auto;font-size:11px;font-weight:600;color:var(--green)}
.exercise-progress{display:flex;gap:4px;margin-bottom:16px}
.exercise-progress .dot{flex:1;height:4px;border-radius:2px;background:var(--border)}
.exercise-progress .dot.done{background:var(--green)}
.exercise-progress .dot.current{background:var(--blue)}
.exercise-card{background:var(--white);border-radius:var(--radius);padding:20px;margin:12px 0;box-shadow:var(--shadow)}
.exercise-prompt{font-size:16px;font-weight:600;text-align:center;margin:20px 0;line-height:1.5}
.exercise-prompt .hint{font-size:13px;font-weight:400;color:var(--text-light);margin-top:4px}
.exercise-prompt .emoji-display{font-size:64px;margin:8px 0}
.exercise-options{display:grid;gap:8px}
.exercise-opt{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg);border-radius:var(--radius-sm);border:2px solid transparent;cursor:pointer;transition:all .15s;font-size:14px;font-family:inherit;text-align:left;color:var(--text);width:100%}
.exercise-opt:hover{border-color:var(--blue);background:var(--blue-bg)}
.exercise-opt.correct{border-color:var(--green);background:var(--green-bg)}
.exercise-opt.wrong{border-color:var(--red);background:var(--red-bg)}
.exercise-opt .opt-label{width:24px;height:24px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text-light);flex-shrink:0}
.exercise-opt.correct .opt-label{background:var(--green);color:#fff}
.exercise-opt.wrong .opt-label{background:var(--red);color:#fff}
.exercise-feedback{display:none;text-align:center;padding:16px;border-radius:var(--radius-sm);margin-top:12px;font-weight:600}
.exercise-feedback.show{display:block}
.exercise-feedback.correct{background:var(--green-bg);color:var(--green)}
.exercise-action{text-align:center;margin-top:12px}
.next-btn{background:var(--green);color:#fff;border:none;padding:12px 32px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.next-btn:hover{background:var(--green-hover);transform:translateY(-1px)}
@media(max-width:900px){.phone{width:280px;height:560px}}
@media(max-width:600px){.phone{width:240px;height:480px;border-radius:24px}.phone-notch{width:80px;height:18px}}
</style>
</head>
<body>
<div class="phone-wrap">
<div class="phone">
<div class="phone-notch"></div>
<div class="phone-screen">
<div class="status-bar"><span class="time">9:41</span><span>📶 🔋 100%</span></div>
<div class="phone-content">
<div class="screen-header">
  <button class="back-btn">←</button>
  <span class="screen-title">基础问候</span>
  <span class="exercise-xp">+0 XP</span>
</div>
<div class="exercise-progress">
  <div class="dot done"></div>
  <div class="dot done"></div>
  <div class="dot done"></div>
  <div class="dot current"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>
<div class="exercise-card">
  <div class="exercise-prompt">
    <div class="emoji-display">👋</div>
    <div class="prompt-text">¿Cómo se dice "朋友" en español?</div>
    <div class="hint">Selecciona la respuesta correcta</div>
  </div>
  <div class="exercise-options">
    <button class="exercise-opt correct">
      <span class="opt-label">A</span> Amigo
    </button>
    <button class="exercise-opt wrong">
      <span class="opt-label">B</span> Hermano
    </button>
    <button class="exercise-opt">
      <span class="opt-label">C</span> Maestro
    </button>
  </div>
  <div class="exercise-feedback show correct">✅ ¡Correcto! Amigo 就是"朋友"的意思</div>
  <div class="exercise-action">
    <button class="next-btn">下一题 →</button>
  </div>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
