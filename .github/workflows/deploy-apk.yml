name: Build APK & Deploy to Cloudflare Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (不含 v)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK & platform
        run: |
          sdkmanager --install "platforms;android-34"
          sdkmanager --install "build-tools;34.0.0"
          sdkmanager --install "ndk;27.0.12077973"
          yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Initialize Android project
        run: npm run tauri android init
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Patch custom Android sources
        run: node scripts/android-patch.cjs --force

      - name: Build Android APK
        run: npm run tauri android build -- --target aarch64 --apk
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Stage APK & icon for Pages
        run: |
          mkdir -p pages-dist
          cp src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk pages-dist/Amiga.apk
          cp pages/amiga-icon.png pages-dist/amiga-icon.png
          cp pages/index.html pages-dist/index.html
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Set version in HTML
        shell: pwsh
        run: |
          (Get-Content pages-dist/index.html) -replace 'v0\.3\.8', "v$env:VERSION" | Set-Content pages-dist/index.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: amiga
          directory: pages-dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
