<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Idioma - 关卡完成</title>
<style>
:root{--green:#58cc02;--green-hover:#46a302;--green-bg:#eaffd6;--blue:#1cb0f6;--blue-hover:#1899d6;--blue-bg:#ddf4ff;--orange:#ff9600;--orange-hover:#e08500;--orange-bg:#fff0d6;--red:#ff4b4b;--red-bg:#ffe0e0;--purple:#7c3aed;--purple-bg:#ede9fe;--pink:#ec4899;--pink-bg:#fce7f3;--text:#2d2d2d;--text-light:#777;--text-lighter:#aaa;--bg:#f5f5f5;--white:#fff;--border:#e5e5e5;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 30px rgba(0,0,0,.15);--radius:12px;--radius-sm:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;font-size:15px;color:var(--text);background:#d4d4d4}
.phone-wrap{display:flex;justify-content:center;margin:30px 0}
.phone{width:320px;height:640px;background:var(--white);border-radius:44px;box-shadow:0 12px 40px rgba(0,0,0,.2),inset 0 0 0 1px rgba(255,255,255,.1);border:3px solid #1a1a1a;position:relative;overflow:hidden;flex-shrink:0}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:130px;height:28px;background:#1a1a1a;border-radius:0 0 18px 18px;z-index:10}
.phone-notch::after{content:'';position:absolute;top:6px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;border:2px solid #333;background:transparent}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;background:linear-gradient(180deg,#f0fff0 0%,var(--white) 40%)}
.phone-screen::-webkit-scrollbar{width:0}
.phone-content{padding:8px 16px 16px}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 6px;font-size:12px;font-weight:700;background:var(--white);position:sticky;top:0;z-index:9;color:#1a1a1a;border-bottom:1px solid var(--border)}
.status-bar .time{font-weight:800;font-size:13px}
.status-icons{display:flex;align-items:center;gap:4px;font-size:11px}
.screen-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;padding-top:4px}
.back-btn{background:none;border:none;font-size:22px;cursor:pointer;font-family:inherit;padding:4px;color:var(--text);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.back-btn:hover{background:var(--bg)}
.screen-title{font-weight:700;font-size:15px;color:var(--text)}
.complete-overlay{text-align:center;padding:24px 16px 20px}
.complete-overlay .big-icon{font-size:72px;margin-bottom:4px;display:block;animation:bounce 1s ease-in-out infinite}
.complete-overlay h2{font-size:26px;font-weight:800;color:var(--text);margin-bottom:4px}
.complete-overlay .sub{color:var(--text-light);font-size:14px;margin-bottom:20px;font-weight:500}
.xp-burst{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--green),var(--green-hover));color:#fff;padding:14px 32px;border-radius:50px;font-size:30px;font-weight:800;margin:8px 0 20px;box-shadow:0 6px 20px rgba(88,204,2,.35)}
.xp-burst .xp-icon{font-size:34px}
.stats-grid{display:flex;justify-content:center;gap:20px;margin:20px 0 24px}
.stat-item{text-align:center;background:var(--bg);padding:14px 20px;border-radius:var(--radius-sm);flex:1;max-width:90px}
.stat-item .num{font-size:20px;font-weight:800;margin-bottom:2px}
.stat-item .label{font-size:10px;color:var(--text-light);font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.stat-item .num.orange{color:var(--orange)}
.stat-item .num.blue{color:var(--blue)}
.stat-item .num.green{color:var(--green)}
.complete-btn{background:linear-gradient(135deg,var(--green),var(--green-hover));color:#fff;border:none;padding:16px 48px;border-radius:50px;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 6px 20px rgba(88,204,2,.3);width:100%}
.complete-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(88,204,2,.4)}
.particles{position:relative;height:0}
.particle{position:absolute;font-size:20px;animation:floatUp 2s ease-out forwards;opacity:0}
.p1{left:10%;animation-delay:.1s}.p2{left:30%;animation-delay:.4s}.p3{left:50%;animation-delay:.2s}.p4{left:70%;animation-delay:.5s}.p5{left:90%;animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-120px) scale(1.5)}}
@media(max-width:900px){.phone{width:280px;height:560px}}
@media(max-width:600px){.phone{width:240px;height:480px;border-radius:24px}.phone-notch{width:80px;height:18px}}
body.embed{background:#e8e8e8;display:flex;align-items:center;justify-content:center;min-height:100vh}
body.embed .phone{margin:10px auto}
</style>
</head>
<body>
<script>(function(){if(location.search.indexOf('embed=1')>=0)document.body.className='embed';})();</script>
<div class="phone-wrap">
<div class="phone">
<div class="phone-notch"></div>
<div class="phone-screen">
<div class="status-bar"><span class="time">9:41</span><span class="status-icons">📶 5G 🔋 100%</span></div>
<div class="phone-content">
<div class="screen-header">
  <button class="back-btn">←</button>
  <span class="screen-title">关卡完成</span>
</div>
<div class="complete-overlay">
  <div class="particles">
    <span class="particle p1">⭐</span>
    <span class="particle p2">✨</span>
    <span class="particle p3">🌟</span>
    <span class="particle p4">💫</span>
    <span class="particle p5">🎊</span>
  </div>
  <span class="big-icon">🎉</span>
  <h2>¡Excelente!</h2>
  <div class="sub">基础问候 · 已完成</div>
  <div class="xp-burst"><span class="xp-icon">⭐</span> +45 XP</div>
  <div class="stats-grid">
    <div class="stat-item"><div class="num orange">🔥 8</div><div class="label">连胜天数</div></div>
    <div class="stat-item"><div class="num blue">💎 +5</div><div class="label">宝石获得</div></div>
    <div class="stat-item"><div class="num green">92%</div><div class="label">正确率</div></div>
  </div>
  <button class="complete-btn">继续学习 →</button>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
