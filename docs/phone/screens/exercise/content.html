<div class="screen-header">
  <button class="back-btn" data-screen="scrHome">←</button>
  <span class="screen-title">基础问候</span>
  <span class="exercise-xp" id="exerciseXp">+0 XP</span>
</div>
<div class="exercise-progress" id="exerciseProgress">
  <div class="dot done"></div>
  <div class="dot done"></div>
  <div class="dot done"></div>
  <div class="dot current"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>
<div class="exercise-card" id="exerciseCard">
  <div class="exercise-prompt" id="exercisePrompt">
    <div class="prompt-text">加载题目中...</div>
    <div class="hint"></div>
  </div>
  <div class="exercise-options" id="exerciseOptions">
    <!-- sentence_sort: populated dynamically -->
    <div class="word-chips" id="wordChips" style="display:none"></div>
    <div class="answer-area" id="answerArea" style="display:none"></div>
    <button class="next-btn" id="sortCheckBtn" style="display:none">检查答案</button>
  </div>
  <div class="exercise-feedback" id="exerciseFeedback"></div>
  <div class="exercise-action" id="exerciseAction">
    <button class="next-btn" id="nextBtn" style="display:none;">下一题 →</button>
  </div>
</div>
